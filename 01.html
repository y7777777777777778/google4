<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>移動中...</title>

<style>
body{
  font-family: sans-serif;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.box{
  background:white;
  padding:40px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  text-align:center;
}

h1{
  margin-bottom:10px;
}

p{
  color:#555;
}
</style>

<script>
setTimeout(function(){
  window.location.href = "https://example.com"; // ←ここに飛ばしたいURL
}, 10000); // 5000ms = 5秒
</script>

</head>
<body>

<div class="box">
  <h1>音量を最大にしてください</h1>
  <p>操作で人間かを判断しています...</p>
</div>

</body>
</html>
