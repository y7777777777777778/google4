<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テトリス</title>

<style>
body{
margin:0;
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
background:black;
margin-top:20px;
border:4px solid #555;
}

#warning{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:red;
font-size:40px;
display:flex;
justify-content:center;
align-items:center;
display:none;
z-index:999;
}
</style>
</head>

<body>

<h1>テトリス</h1>
<p>← → ↓ で操作</p>

<canvas id="game" width="200" height="400"></canvas>

<div id="warning">
音を出してください
</div>

<audio id="music" autoplay loop>
<source src="https://files.catbox.moe/00hrk0.mp3">
</audio>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const COLS=10
const ROWS=20
const SIZE=20

let block={
x:4,
y:0
}

let gameRunning=true

function draw(){

ctx.clearRect(0,0,200,400)

ctx.fillStyle="cyan"
ctx.fillRect(block.x*SIZE,block.y*SIZE,SIZE,SIZE)

}

function update(){

if(gameRunning){

block.y++

if(block.y>ROWS){
block.y=0
block.x=Math.floor(Math.random()*COLS)
}

draw()

}

}

setInterval(update,400)

document.addEventListener("keydown",e=>{

if(!gameRunning) return

if(e.key==="ArrowLeft") block.x--
if(e.key==="ArrowRight") block.x++
if(e.key==="ArrowDown") block.y++

})

const audio=document.getElementById("music")
const warning=document.getElementById("warning")

setInterval(()=>{

if(audio.paused || audio.muted || audio.volume===0){

warning.style.display="flex"
gameRunning=false

}else{

warning.style.display="none"
gameRunning=true

}

},1000)

</script>

</body>
</html>
