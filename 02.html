```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>認証</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#111;
  color:white;
  font-family:sans-serif;
}

button{
  margin-top:20px;
  padding:15px 30px;
  font-size:20px;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#45a049;
}
</style>
</head>

<body>

<div>ここを押して認証を行ってください</div>
<button id="authBtn">認証する</button>

<audio id="bgm">
  <source src="https://files.catbox.moe/00hrk0.mp3" type="audio/mpeg">
</audio>

<script>

const btn = document.getElementById("authBtn");
const audio = document.getElementById("bgm");

btn.addEventListener("click", () => {

  // 音を再生
  audio.play();

  // ボタン無効化
  btn.disabled = true;
  btn.textContent = "認証中...";

  // 3秒後に移動
  setTimeout(() => {
    window.location.href = "https://googlecom-seven.vercel.app/03.html";
  }, 6000);

});

</script>

</body>
</html>
