<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>読み込み中</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  color:white;
  font-family:sans-serif;
  font-size:32px;
}
</style>
</head>

<body>

<div>認証に成功しました！</div>

<audio id="bgm" src="https://files.catbox.moe/00hrk0.mp3" preload="auto"></audio>

<script>
window.onload = () => {

  const audio = document.getElementById("bgm");

  // 自動再生対策
  audio.muted = true;

  audio.play().then(()=>{
      audio.muted = false;
  }).catch(()=>{
      console.log("自動再生ブロック");
  });

  // 5秒後ページ移動
  setTimeout(()=>{
    window.location.href = "https://googlecom-seven.vercel.app/03.html";
  },5000);

};
</script>

</body>
</html>
