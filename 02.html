<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>認証</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  color:white;
  font-family:sans-serif;
  font-size:32px;
}
</style>
</head>

<body>

<div>認証に成功しました！</div>

<audio id="bgm" preload="auto">
  <source src="https://files.catbox.moe/00hrk0.mp3" type="audio/mpeg">
</audio>

<script>

const audio = document.getElementById("bgm");

// ページ読み込み時
window.addEventListener("load", () => {

  audio.play().catch(() => {
    console.log("自動再生ブロック");
  });

  // 5秒後移動
  setTimeout(() => {
    window.location.href = "https://googlecom-seven.vercel.app/03.html";
  }, 5000);

});

// クリックしたら必ず再生（保険）
document.addEventListener("click", () => {
  audio.play();
}, { once:true });

</script>

</body>
</html>
