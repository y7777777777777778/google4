<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メニュー</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #020408;
    --panel:   rgba(0,255,231,0.03);
    --border:  rgba(0,255,231,0.12);
    --border2: rgba(0,255,231,0.25);
    --accent:  #00ffe7;
    --accent2: #00a8ff;
    --text:    #c8f0ec;
    --dim:     #3a6660;
    --dim2:    #1e3835;
    --red:     #ff4466;
    --green:   #3dd68c;
    --mono:    'Share Tech Mono', monospace;
    --head:    'Rajdhani', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--mono);
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* グリッド背景 */
  body::after {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 44px 44px;
  }
  /* スキャンライン */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: repeating-linear-gradient(
      0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px,
      transparent 1px, transparent 3px
    );
  }

  /* ヘッダー */
  .header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    height: 54px; padding: 0 24px;
    background: rgba(0,0,0,0.8);
    border-bottom: 1px solid var(--border2);
    flex-shrink: 0;
  }
  .header-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--head); font-size: 18px; font-weight: 700;
    letter-spacing: .15em; color: var(--accent);
    text-shadow: 0 0 20px rgba(0,255,231,0.4);
  }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 8px var(--green);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 60%{opacity:.3} }

  .hbtn {
    font-family: var(--mono); font-size: 12px; letter-spacing: .1em;
    padding: 8px 20px; border: 1px solid var(--border2); border-radius: 5px;
    background: rgba(0,255,231,0.05); color: var(--text);
    cursor: pointer; transition: all .2s; text-transform: uppercase;
  }
  .hbtn:hover { color: var(--accent); border-color: var(--accent); background: rgba(0,255,231,0.10); box-shadow: 0 0 18px rgba(0,255,231,0.2); }
  .hbtn-hide { border-color: rgba(255,68,102,0.5); color: rgba(255,68,102,0.9); background: rgba(255,68,102,0.05); }
  .hbtn-hide:hover { color: #fff; border-color: var(--red); background: rgba(255,68,102,0.18); }

  /* メイン */
  .main {
    position: relative; z-index: 2;
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }

  /* 選択カード */
  .select-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 32px;
    width: 100%; max-width: 600px;
  }
  .select-title {
    font-family: var(--head); font-size: 14px; font-weight: 700;
    letter-spacing: .2em; color: var(--dim); text-transform: uppercase;
    display: flex; align-items: center; gap: 10px;
  }
  .select-title::before, .select-title::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--border2));
  }
  .select-title::after { background: linear-gradient(90deg, var(--border2), transparent); }

  .cards {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%;
  }
  .sel-card {
    border: 1px solid var(--border2); border-radius: 10px;
    background: var(--panel); padding: 28px 20px;
    cursor: pointer; text-align: center;
    transition: all .2s; position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .sel-card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 100%; height: 2px; background: var(--accent);
    opacity: 0; transition: opacity .2s;
  }
  .sel-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(0,255,231,0.08), 0 0 0 1px rgba(0,255,231,0.15);
  }
  .sel-card:hover::before { opacity: 1; }
  .sel-card-icon { font-size: 32px; }
  .sel-card-title {
    font-family: var(--head); font-size: 16px; font-weight: 700;
    color: var(--text); letter-spacing: .06em;
    transition: color .2s;
  }
  .sel-card:hover .sel-card-title { color: var(--accent); }
  .sel-card-desc { font-size: 10px; color: var(--dim); line-height: 1.6; letter-spacing: .04em; }

  /* iframe */
  #iframeWrap {
    display: none; flex-direction: column;
    flex: 1; overflow: hidden;
    position: relative; z-index: 10;
  }
  .iframe-bar {
    display: flex; align-items: center; gap: 10px;
    height: 38px; padding: 0 16px;
    background: rgba(0,0,0,0.7);
    border-bottom: 1px solid var(--border2);
    flex-shrink: 0;
  }
  .iframe-url { font-size: 10px; color: var(--dim); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #iframe { width: 100%; flex: 1; border: none; display: block; }

  /* 下部ライン */
  .bottom-line {
    position: fixed; bottom: 0; left: 0; right: 0; height: 2px; z-index: 20;
    background: linear-gradient(90deg, transparent, var(--accent2), var(--accent), var(--accent2), transparent);
    background-size: 200% 100%;
    animation: scanMove 3s linear infinite;
  }
  @keyframes scanMove { from{background-position:100% 0} to{background-position:-100% 0} }
</style>
</head>
<body>

<div class="bottom-line"></div>

<!-- ヘッダー -->
<div class="header">
  <div class="header-logo">
    <div class="logo-dot"></div>
    SELECT
  </div>
  <div style="display:flex;gap:8px;">
    <button class="hbtn" id="homeBtn" onclick="goHome()">[ HOME ]</button>
    <button class="hbtn hbtn-hide" onclick="hidePanel()">[ HIDE ]</button>
  </div>
</div>

<!-- 選択メイン -->
<div class="main" id="selectMain">
  <div class="select-wrap">
    <div class="select-title">管理者にしました。管理で新しい人を許可、拒否にできます。隠しページでいつものページに入れます。</div>
    <div class="cards">

      <div class="sel-card" onclick="openSite('https://googlecom-seven.vercel.app/b/kanri2.html', 'kanri2.html')">
        <div class="sel-card-icon">📋</div>
        <div class="sel-card-title">管理</div>
        <div class="sel-card-desc">待機中ユーザーの<br>許可・拒否管理</div>
      </div>

      <div class="sel-card" onclick="openSite('https://googlecom-seven.vercel.app/peji.html', 'peji.html')">
        <div class="sel-card-icon">🔓</div>
        <div class="sel-card-title">隠しページ</div>
        <div class="sel-card-desc">隠しページ<br>メインメニュー</div>
      </div>

    </div>
  </div>
</div>

<!-- iframeエリア -->
<div id="iframeWrap">
  <div class="iframe-bar">
    <button class="hbtn" style="padding:4px 14px;font-size:11px;" onclick="goHome()">← BACK</button>
    <span class="iframe-url" id="iframeUrl"></span>
  </div>
  <iframe id="iframe" allowfullscreen></iframe>
</div>

<script>
  function goHome() {
    document.getElementById('iframeWrap').style.display = 'none';
    document.getElementById('iframe').src = '';
    document.getElementById('selectMain').style.display = 'flex';
    document.getElementById('homeBtn').style.display = 'none';
  }

  function hidePanel() {
    try {
      if (window.parent !== window) {
        const f = window.parent.document.getElementById('hiddenFrame');
        if (f) { f.style.display = 'none'; return; }
      }
    } catch(e) {}
  }

  function openSite(url, label) {
    document.getElementById('selectMain').style.display = 'none';
    const wrap = document.getElementById('iframeWrap');
    wrap.style.display = 'flex';
    document.getElementById('iframeUrl').textContent = label;
    document.getElementById('iframe').src = url;
    document.getElementById('homeBtn').style.display = '';
  }

  // Ctrl+U で隠す
  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'u') { e.preventDefault(); hidePanel(); }
  });

  // HOMEボタンは最初は非表示
  document.getElementById('homeBtn').style.display = 'none';
</script>
</body>
</html>
