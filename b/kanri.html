<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>アクセス管理 - 管理画面</title>

<style>
  /* ===== リセット & ベース ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0f1117;
    --surface:    #1a1d27;
    --surface2:   #22263a;
    --border:     #2e3354;
    --text:       #e8eaf6;
    --text-muted: #8b92b8;
    --ok:         #00e676;
    --wait:       #ffb300;
    --ng:         #ff5252;
    --accent:     #5c6bc0;
    --accent2:    #7986cb;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', 'Consolas', monospace;
    min-height: 100vh;
  }

  /* ===== ヘッダー ===== */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text);
  }

  header span.subtitle {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  /* ===== ステータスバー（件数表示） ===== */
  .stats-bar {
    display: flex;
    gap: 20px;
    padding: 20px 32px;
    flex-wrap: wrap;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 120px;
  }

  .stat-card .stat-num {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .stat-card .stat-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .stat-card.total  .stat-num { color: var(--accent2); }
  .stat-card.ok     .stat-num { color: var(--ok); }
  .stat-card.wait   .stat-num { color: var(--wait); }
  .stat-card.ng     .stat-num { color: var(--ng); }

  /* ===== ツールバー ===== */
  .toolbar {
    padding: 0 32px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .search-wrap {
    position: relative;
  }
  .search-wrap input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 9px 14px 9px 36px;
    font-size: 13px;
    font-family: inherit;
    width: 260px;
    outline: none;
    transition: border 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-wrap::before {
    content: "🔍";
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    pointer-events: none;
  }

  .refresh-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text-muted);
    padding: 9px 16px; font-size: 13px; cursor: pointer;
    font-family: inherit;
    transition: border 0.15s, color 0.15s;
  }
  .refresh-btn:hover { border-color: var(--accent2); color: var(--text); }

  /* ===== テーブル ===== */
  .table-wrap {
    margin: 0 32px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  thead th {
    padding: 14px 20px;
    text-align: left;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
    font-weight: 600;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  tbody td {
    padding: 14px 20px;
    vertical-align: middle;
  }

  /* ===== ユーザー名セル ===== */
  .user-name {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .user-name-text { font-weight: 500; }

  /* ===== ステータスバッジ ===== */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .badge::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .badge-ok   { background: rgba(0,230,118,0.12); color: var(--ok); border: 1px solid rgba(0,230,118,0.3); }
  .badge-ok::before { background: var(--ok); }
  .badge-wait { background: rgba(255,179,0,0.12); color: var(--wait); border: 1px solid rgba(255,179,0,0.3); }
  .badge-wait::before { background: var(--wait); animation: blink 1.4s infinite; }
  .badge-ng   { background: rgba(255,82,82,0.12); color: var(--ng); border: 1px solid rgba(255,82,82,0.3); }
  .badge-ng::before { background: var(--ng); }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ===== 操作ボタン ===== */
  .action-btns { display: flex; gap: 8px; align-items: center; }

  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    border: 1px solid transparent;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-ok {
    background: rgba(0,230,118,0.12);
    border-color: rgba(0,230,118,0.35);
    color: var(--ok);
  }
  .btn-ok:hover:not(:disabled) {
    background: rgba(0,230,118,0.25);
    border-color: var(--ok);
  }

  .btn-ng {
    background: rgba(255,179,0,0.10);
    border-color: rgba(255,179,0,0.35);
    color: var(--wait);
  }
  .btn-ng:hover:not(:disabled) {
    background: rgba(255,179,0,0.22);
    border-color: var(--wait);
  }

  .btn-del {
    background: rgba(255,82,82,0.10);
    border-color: rgba(255,82,82,0.3);
    color: var(--ng);
    width: 32px; height: 32px;
    padding: 0; display: flex; align-items: center; justify-content: center;
    font-size: 15px; border-radius: 6px;
  }
  .btn-del:hover:not(:disabled) {
    background: rgba(255,82,82,0.22);
    border-color: var(--ng);
  }

  /* ===== ローディング / 空状態 ===== */
  .loading-row td, .empty-row td {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .spinner {
    display: inline-block;
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== トースト ===== */
  #toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 100;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }

  /* ===== 確認ダイアログ ===== */
  #confirmOverlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200; justify-content: center; align-items: center;
  }
  #confirmOverlay.active { display: flex; }

  #confirmBox {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 28px;
    width: 340px;
    text-align: center;
    animation: modalIn 0.18s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.9); }
    to   { opacity: 1; transform: scale(1); }
  }
  #confirmBox h3 {
    font-size: 16px; margin-bottom: 10px; color: var(--ng);
  }
  #confirmBox p {
    font-size: 13px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6;
  }
  #confirmBox .confirm-btns { display: flex; gap: 10px; justify-content: center; }
  #confirmBox .btn-confirm-cancel {
    padding: 10px 20px; border-radius: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-muted); font-size: 13px; cursor: pointer;
    font-family: inherit;
  }
  #confirmBox .btn-confirm-ok {
    padding: 10px 20px; border-radius: 6px;
    background: rgba(255,82,82,0.18); border: 1px solid var(--ng);
    color: var(--ng); font-size: 13px; cursor: pointer;
    font-family: inherit; font-weight: 700;
  }

  /* ===== 表示モードバー ===== */
  .mode-bar {
    margin: 0 32px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .mode-bar-left {
    display: flex; align-items: center; gap: 14px;
  }
  .mode-bar-icon { font-size: 22px; }
  .mode-bar-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .mode-bar-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .mode-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .mode-btn {
    padding: 8px 18px; border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted); font-size: 13px;
    cursor: pointer; font-family: inherit;
    transition: all .15s; font-weight: 500;
  }
  .mode-btn:hover { border-color: #1a73e8; color: #1a73e8; background: rgba(26,115,232,0.06); }
  .mode-btn.active {
    border-color: #1a73e8; color: #1a73e8;
    background: rgba(26,115,232,0.1); font-weight: 700;
  }

  /* ===== 一般公開モードバー ===== */
  .public-mode-bar {
    margin: 0 32px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    transition: border 0.2s, background 0.2s;
  }
  .public-mode-bar.active {
    border-color: var(--ok);
    background: rgba(0,230,118,0.05);
  }
  .public-mode-left {
    display: flex; align-items: center; gap: 14px;
  }
  .public-mode-icon { font-size: 24px; }
  .public-mode-title {
    font-size: 14px; font-weight: 700; color: var(--text);
    letter-spacing: 0.04em;
  }
  .public-mode-desc {
    font-size: 12px; color: var(--text-muted); margin-top: 2px;
  }

  /* トグルスイッチ */
  .toggle-switch {
    position: relative; display: inline-block;
    width: 52px; height: 28px; flex-shrink: 0; cursor: pointer;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 28px;
    transition: 0.25s;
  }
  .toggle-slider::before {
    content: "";
    position: absolute;
    width: 20px; height: 20px;
    left: 3px; top: 3px;
    background: var(--text-muted);
    border-radius: 50%;
    transition: 0.25s;
  }
  .toggle-switch input:checked + .toggle-slider {
    background: rgba(0,230,118,0.2);
    border-color: var(--ok);
  }
  .toggle-switch input:checked + .toggle-slider::before {
    transform: translateX(24px);
    background: var(--ok);
  }

  /* ===== アク禁パネル ===== */
  .ban-panel {
    margin: 0 32px 0;
    background: rgba(255,68,102,0.05);
    border: 1px solid rgba(255,68,102,0.25);
    border-radius: 10px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .ban-panel.all-banned {
    background: rgba(255,68,102,0.12);
    border-color: rgba(255,68,102,0.5);
  }
  .ban-panel-left { display: flex; align-items: center; gap: 12px; }
  .ban-panel-icon { font-size: 22px; }
  .ban-panel-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .ban-panel-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .ban-panel-actions { display: flex; gap: 8px; align-items: center; }
  .ban-all-btn {
    padding: 8px 18px; border-radius: 6px;
    border: 1px solid rgba(255,68,102,0.4);
    background: rgba(255,68,102,0.08);
    color: #ff4466; font-size: 13px; cursor: pointer;
    font-family: inherit; font-weight: 600;
    transition: all .15s;
  }
  .ban-all-btn:hover { background: rgba(255,68,102,0.2); border-color: #ff4466; }
  .ban-all-btn.active {
    background: rgba(255,68,102,0.25);
    border-color: #ff4466; color: #fff;
  }

  .ban-list-wrap {
    margin: 8px 32px 0;
    background: var(--surface);
    border: 1px solid rgba(255,68,102,0.2);
    border-top: none;
    border-radius: 0 0 10px 10px;
    padding: 12px 16px;
  }
  .ban-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; min-height: 24px; }
  .ban-tag {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,68,102,0.1);
    border: 1px solid rgba(255,68,102,0.3);
    border-radius: 20px; padding: 4px 12px;
    font-size: 12px; color: #ff6680;
  }
  .ban-tag button {
    background: none; border: none; cursor: pointer;
    color: rgba(255,68,102,0.6); font-size: 14px;
    line-height: 1; padding: 0; transition: color .12s;
  }
  .ban-tag button:hover { color: #ff4466; }
  .ban-add-row { display: flex; gap: 8px; }
  .ban-add-row input {
    flex: 1; padding: 8px 12px; border-radius: 6px;
    border: 1px solid rgba(255,68,102,0.3);
    background: rgba(255,68,102,0.05);
    color: var(--text); font-size: 13px; outline: none;
    font-family: inherit;
    transition: border .15s;
  }
  .ban-add-row input:focus { border-color: #ff4466; }
  .ban-add-row input::placeholder { color: var(--text-muted); opacity: .6; }
  .ban-add-btn {
    padding: 8px 16px; border-radius: 6px;
    border: 1px solid rgba(255,68,102,0.4);
    background: rgba(255,68,102,0.1);
    color: #ff4466; font-size: 13px; cursor: pointer;
    font-family: inherit; font-weight: 600;
    transition: all .15s;
  }
  .ban-add-btn:hover { background: rgba(255,68,102,0.2); }

  /* ===== レスポンシブ ===== */
  @media (max-width: 600px) {
    .table-wrap { margin: 0 16px 24px; }
    .stats-bar, .toolbar { padding: 16px; }
    header { padding: 0 16px; }
    .search-wrap input { width: 100%; }
  }
</style>
</head>

<body>

<!-- ========== ヘッダー ========== -->
<header>
  <div class="header-left">
    <div class="header-icon">🔐</div>
    <div>
      <h1>ACCESS CONTROL PANEL</h1>
      <span class="subtitle">ユーザーアクセス管理システム</span>
    </div>
  </div>
</header>

<!-- ========== ステータス統計カード ========== -->
<div class="stats-bar">
  <div class="stat-card total">
    <span class="stat-num" id="countTotal">-</span>
    <span class="stat-label">Total</span>
  </div>
  <div class="stat-card ok">
    <span class="stat-num" id="countOk">-</span>
    <span class="stat-label">許可</span>
  </div>
  <div class="stat-card wait">
    <span class="stat-num" id="countWait">-</span>
    <span class="stat-label">待機中</span>
  </div>
  <div class="stat-card ng">
    <span class="stat-num" id="countNg">-</span>
    <span class="stat-label">拒否</span>
  </div>
</div>

<!-- ========== 表示モード ========== -->
<div class="mode-bar">
  <div class="mode-bar-left">
    <span class="mode-bar-icon">📺</span>
    <div>
      <div class="mode-bar-title">Ctrl+U の表示先</div>
      <div class="mode-bar-desc" id="modeDesc">読み込み中...</div>
    </div>
  </div>
  <div class="mode-btns">
    <button class="mode-btn" id="modeBtn1" onclick="setDisplayMode('iframe')">
      🖼 iframeで表示（今のページのまま）
    </button>
    <button class="mode-btn" id="modeBtn2" onclick="setDisplayMode('kanri2')">
      📋 kanri2.html（待機管理ページ）
    </button>
    <button class="mode-btn" id="modeBtn3" onclick="setDisplayMode('peji')">
      🔓 peji.html（隠しページ）
    </button>
  </div>
</div>

<!-- ========== 一般公開モード ========== -->
<div class="public-mode-bar" id="publicModeBar">
  <div class="public-mode-left">
    <span class="public-mode-icon">🌐</span>
    <div>
      <div class="public-mode-title">一般公開モード</div>
      <div class="public-mode-desc" id="publicModeDesc">OFF：申請者は管理者の許可が必要です</div>
    </div>
  </div>
  <label class="toggle-switch">
    <input type="checkbox" id="publicModeToggle">
    <span class="toggle-slider"></span>
  </label>
</div>

<!-- ========== アク禁パネル ========== -->
<div class="ban-panel" id="banPanel">
  <div class="ban-panel-left">
    <span class="ban-panel-icon">🚫</span>
    <div>
      <div class="ban-panel-title">アク禁管理</div>
      <div class="ban-panel-desc" id="banPanelDesc">アク禁リスト: 読み込み中...</div>
    </div>
  </div>
  <div class="ban-panel-actions">
    <button class="ban-all-btn" id="banAllBtn" onclick="toggleAllBan()">全員アク禁</button>
  </div>
</div>

<!-- アク禁リスト -->
<div class="ban-list-wrap" id="banListWrap">
  <div class="ban-tags" id="banTags"></div>
  <div class="ban-add-row">
    <input type="text" id="banNameInput" placeholder="アク禁するユーザー名...">
    <button class="ban-add-btn" onclick="addBanName()">+ アク禁</button>
  </div>
</div>

<!-- ========== ツールバー ========== -->
<div class="toolbar">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="名前で絞り込み...">
  </div>
  <button class="refresh-btn" id="refreshBtn">
    🔄 更新
  </button>
</div>

<!-- ========== ユーザーテーブル ========== -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:30%">Name</th>
        <th style="width:15%">Status</th>
        <th style="width:20%">表示先</th>
        <th style="width:35%">操作</th>
      </tr>
    </thead>
    <tbody id="userTableBody">
      <!-- JSで動的生成 -->
      <tr class="loading-row">
        <td colspan="3">
          <div class="spinner"></div><br>
          読み込み中...
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- ========== トースト ========== -->
<div id="toast"></div>

<!-- ========== 削除確認ダイアログ ========== -->
<div id="confirmOverlay">
  <div id="confirmBox">
    <h3>⚠ ユーザーを削除しますか？</h3>
    <p id="confirmMsg">このユーザーのデータを完全に削除します。<br>削除すると再度 Name 入力が可能になります。</p>
    <div class="confirm-btns">
      <button class="btn-confirm-cancel" id="confirmCancelBtn">キャンセル</button>
      <button class="btn-confirm-ok"     id="confirmOkBtn">削除する</button>
    </div>
  </div>
</div>


<!-- ========== Firebase SDK ========== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import {
    getFirestore, collection, getDocs, doc, updateDoc,
    deleteDoc, orderBy, query, where, setDoc, getDoc
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  // ----------------------------------------
  // Firebase 設定（ここに自分の設定を入れる）
  // ----------------------------------------
  const firebaseConfig = {
    apiKey:            "AIzaSyAdQbSXJbRkd0C29O0hW5FgHERR_Vh9FZw",
    authDomain:        "fir-d5882.firebaseapp.com",
    projectId:         "fir-d5882",
    storageBucket:     "fir-d5882.firebasestorage.app",
    messagingSenderId: "68351757634",
    appId:             "1:68351757634:web:0e33ac84b7f1671939ccdb"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ========================================
  // DOM要素
  // ========================================
  const tbody         = document.getElementById("userTableBody");
  const searchInput   = document.getElementById("searchInput");
  const refreshBtn    = document.getElementById("refreshBtn");
  const toast         = document.getElementById("toast");
  const confirmOverlay = document.getElementById("confirmOverlay");
  const confirmMsg    = document.getElementById("confirmMsg");
  const confirmOkBtn  = document.getElementById("confirmOkBtn");
  const confirmCancelBtn = document.getElementById("confirmCancelBtn");

  // カウンター
  const countTotal = document.getElementById("countTotal");
  const countOk    = document.getElementById("countOk");
  const countWait  = document.getElementById("countWait");
  const countNg    = document.getElementById("countNg");

  // ユーザーデータのキャッシュ
  let allUsers = [];
  // 削除確認用コールバック
  let pendingDeleteId = null;

  // ========================================
  // トースト表示
  // ========================================
  function showToast(msg, duration = 3000) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), duration);
  }

  // ========================================
  // アバター文字（名前の頭文字）
  // ========================================
  function getInitial(name) {
    if (!name) return "?";
    // 日本語なら最初の1文字、英語なら大文字
    return name.charAt(0).toUpperCase();
  }

  // ========================================
  // ステータスバッジHTMLを生成
  // ========================================
  function badgeHTML(status) {
    const map = {
      ok:   { cls: "badge-ok",   label: "許可" },
      wait: { cls: "badge-wait", label: "待機中" },
      ng:   { cls: "badge-ng",   label: "拒否" }
    };
    const info = map[status] || { cls: "", label: status };
    return `<span class="badge ${info.cls}">${info.label}</span>`;
  }

  // ========================================
  // テーブルを描画（フィルタ対応）
  // ========================================
  function renderTable(users) {
    // 統計カードを更新
    countTotal.textContent = users.length;
    countOk.textContent    = users.filter(u => u.status === "ok").length;
    countWait.textContent  = users.filter(u => u.status === "wait").length;
    countNg.textContent    = users.filter(u => u.status === "ng").length;

    // 検索フィルタ
    const q = searchInput.value.trim().toLowerCase();
    const filtered = q
      ? users.filter(u => u.name.toLowerCase().includes(q))
      : users;

    // テーブル描画
    if (filtered.length === 0) {
      tbody.innerHTML = `
        <tr class="empty-row">
          <td colspan="3">ユーザーが見つかりません</td>
        </tr>`;
      return;
    }

    tbody.innerHTML = filtered.map(user => {
      const pageMode = userPageMode[user.id] || 'peji';
      return `
      <tr data-id="${user.id}">
        <!-- Name -->
        <td>
          <div class="user-name">
            <div class="user-avatar">${getInitial(user.name)}</div>
            <span class="user-name-text">${escapeHTML(user.name)}</span>
          </div>
        </td>
        <!-- Status -->
        <td>${badgeHTML(user.status)}</td>
        <!-- 表示先 -->
        <td>
          <div class="action-btns">
            <button
              class="btn ${pageMode === 'peji' ? 'btn-ok' : ''}"
              onclick="setUserPageMode('${user.id}', '${escapeHTML(user.name)}', 'peji')"
              title="peji.html"
              style="${pageMode === 'peji' ? '' : 'opacity:0.4'}"
            >🔓</button>
            <button
              class="btn ${pageMode === 'pej' ? 'btn-ok' : ''}"
              onclick="setUserPageMode('${user.id}', '${escapeHTML(user.name)}', 'pej')"
              title="pej.html（選択画面）"
              style="${pageMode === 'pej' ? '' : 'opacity:0.4'}"
            >📋</button>
          </div>
        </td>
        <!-- 操作ボタン -->
        <td>
          <div class="action-btns">
            <button
              class="btn btn-ok"
              onclick="handleAllow('${user.id}', '${escapeHTML(user.name)}')"
              ${user.status === 'ok' ? 'disabled' : ''}
            >✓ 許可</button>
            <button
              class="btn btn-ng"
              onclick="handleDeny('${user.id}', '${escapeHTML(user.name)}')"
              ${user.status === 'ng' ? 'disabled' : ''}
            >✕ 拒否</button>
            <button
              class="btn btn-del"
              onclick="handleDelete('${user.id}', '${escapeHTML(user.name)}')"
              title="削除"
            >🗑</button>
          </div>
        </td>
      </tr>
    `}).join("");
  }

  // XSS対策
  function escapeHTML(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  // ========================================
  // Firestoreからユーザー一覧を取得
  // ========================================
  async function loadUsers() {
    tbody.innerHTML = `
      <tr class="loading-row">
        <td colspan="3">
          <div class="spinner"></div><br>
          読み込み中...
        </td>
      </tr>`;
    try {
      let snapshot;
      try {
        const q = query(collection(db, "users"), orderBy("createdAt", "desc"));
        snapshot = await getDocs(q);
      } catch (indexErr) {
        console.warn("orderBy失敗、フォールバック:", indexErr.message);
        snapshot = await getDocs(collection(db, "users"));
      }
      allUsers = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderTable(allUsers);
    } catch (e) {
      console.error("取得エラー:", e);
      tbody.innerHTML = `
        <tr class="empty-row">
          <td colspan="3">
            ⚠ データ取得に失敗しました<br>
            <small style="color:#5d8a84;font-size:11px;display:block;margin-top:8px;">
              エラー: ${e.message}<br>
              Firestoreのセキュリティルールで read を許可しているか確認してください
            </small>
          </td>
        </tr>`;
      showToast("エラー: " + e.message, 6000);
    }
  }

  // ========================================
  // 許可ボタン処理 → status を "ok" に更新
  // ========================================
  // ユーザーごとの表示先（メモリ＋Firestore）
  let userPageMode = {}; // { userId: 'peji' or 'pej' }

  async function loadUserPageModes() {
    try {
      const snap = await getDocs(collection(db, "users"));
      snap.docs.forEach(d => {
        userPageMode[d.id] = d.data().pageMode || 'peji';
      });
    } catch(e) {}
  }

  window.setUserPageMode = async function(id, name, mode) {
    try {
      await updateDoc(doc(db, "users", id), { pageMode: mode });
      userPageMode[id] = mode;
      // allUsersも更新
      const user = allUsers.find(u => u.id === id);
      if (user) user.pageMode = mode;
      renderTable(allUsers);
      showToast('✅ 「' + name + '」の表示先: ' + (mode === 'peji' ? 'peji.html' : 'pej.html'));
    } catch(e) { showToast('エラー: ' + e.message); }
  };

  window.handleAllow = async function(id, name) {
    try {
      await updateDoc(doc(db, "users", id), { status: "ok" });
      // ローカルキャッシュも更新
      const user = allUsers.find(u => u.id === id);
      if (user) user.status = "ok";
      renderTable(allUsers);
      showToast(`✅ 「${name}」を許可しました`);
    } catch (e) {
      console.error("更新エラー:", e);
      showToast("更新に失敗しました");
    }
  };

  // ========================================
  // 拒否ボタン処理 → status を "ng" に更新
  // ========================================
  window.handleDeny = async function(id, name) {
    try {
      await updateDoc(doc(db, "users", id), { status: "ng" });
      const user = allUsers.find(u => u.id === id);
      if (user) user.status = "ng";
      renderTable(allUsers);
      showToast(`🚫 「${name}」を拒否しました`);
    } catch (e) {
      console.error("更新エラー:", e);
      showToast("更新に失敗しました");
    }
  };

  // ========================================
  // 削除ボタン処理 → 確認ダイアログを表示
  // ========================================
  window.handleDelete = function(id, name) {
    pendingDeleteId = id;
    confirmMsg.innerHTML = `
      <strong style="color: var(--text)">${name}</strong> のデータを完全に削除します。<br>
      削除すると再度 Name 入力が可能になります。`;
    confirmOverlay.classList.add("active");
  };

  // 削除確認OK
  confirmOkBtn.addEventListener("click", async function() {
    if (!pendingDeleteId) return;
    const id = pendingDeleteId;
    confirmOverlay.classList.remove("active");
    const user = allUsers.find(u => u.id === id);
    const name = user ? user.name : "";
    try {
      await deleteDoc(doc(db, "users", id));
      allUsers = allUsers.filter(u => u.id !== id);
      renderTable(allUsers);
      showToast(`🗑 「${name}」を削除しました`);
    } catch (e) {
      console.error("削除エラー:", e);
      showToast("削除に失敗しました");
    }
    pendingDeleteId = null;
  });

  // 削除確認キャンセル
  confirmCancelBtn.addEventListener("click", function() {
    confirmOverlay.classList.remove("active");
    pendingDeleteId = null;
  });

  // 背景クリックでダイアログ閉じる
  confirmOverlay.addEventListener("click", function(e) {
    if (e.target === confirmOverlay) {
      confirmOverlay.classList.remove("active");
      pendingDeleteId = null;
    }
  });

  // ========================================
  // 検索フィルタ（リアルタイム）
  // ========================================
  searchInput.addEventListener("input", function() {
    renderTable(allUsers);
  });

  // ========================================
  // 更新ボタン
  // ========================================
  refreshBtn.addEventListener("click", function() {
    loadUsers();
    showToast("🔄 データを更新しています...", 1500);
  });

  // ========================================
  // 一般公開モード: Firestoreから状態を読み込む
  // ========================================
  const publicToggle  = document.getElementById("publicModeToggle");
  const publicBar     = document.getElementById("publicModeBar");
  const publicDesc    = document.getElementById("publicModeDesc");

  // トグル操作中フラグ（loadと競合防止）
  let publicModeLoading = true;

  async function loadPublicMode() {
    publicModeLoading = true;
    try {
      const snap = await getDoc(doc(db, "config", "publicMode"));
      // ドキュメントが存在する場合のみ値を反映。存在しない場合はOFFのまま
      const val = snap.exists() ? snap.data().value === true : false;
      publicToggle.checked = val;
      updatePublicModeUI(val);
    } catch(e) {
      console.error("publicMode読み込みエラー:", e);
    } finally {
      publicModeLoading = false;
    }
  }

  function updatePublicModeUI(isOn) {
    if (isOn) {
      publicBar.classList.add("active");
      publicDesc.textContent = "ON：申請者は全員自動的に許可されます（拒否は後から可能）";
    } else {
      publicBar.classList.remove("active");
      publicDesc.textContent = "OFF：申請者は管理者の許可が必要です";
    }
  }

  publicToggle.addEventListener("change", async function() {
    // ロード中の誤発火を無視
    if (publicModeLoading) return;
    const isOn = publicToggle.checked;
    // UIを即時反映
    updatePublicModeUI(isOn);
    try {
      // Firestoreに保存（merge:trueで他フィールドを消さない）
      await setDoc(doc(db, "config", "publicMode"), { key: "publicMode", value: isOn }, { merge: true });
      showToast(isOn ? "🌐 一般公開モード ON" : "🔒 一般公開モード OFF", 3000);
    } catch(e) {
      console.error("publicMode保存エラー:", e);
      // 保存失敗したら元に戻す
      publicToggle.checked = !isOn;
      updatePublicModeUI(!isOn);
      showToast("保存に失敗しました: " + e.message, 4000);
    }
  });

  // ========================================
  // アク禁管理
  // ========================================
  let banList = [];
  let allBanned = false;

  async function loadBanList() {
    try {
      const snap = await getDoc(doc(db, "config", "banList"));
      if (snap.exists()) {
        banList   = snap.data().names    || [];
        allBanned = snap.data().allBanned || false;
      }
    } catch(e) { console.error(e); }
    renderBanList();
  }

  async function saveBanList() {
    try {
      await setDoc(doc(db, "config", "banList"), { names: banList, allBanned });
    } catch(e) { showToast("アク禁保存エラー: " + e.message); }
  }

  function renderBanList() {
    const tagsEl = document.getElementById("banTags");
    const panel  = document.getElementById("banPanel");
    const btn    = document.getElementById("banAllBtn");
    const desc   = document.getElementById("banPanelDesc");

    // 全員アク禁の表示
    if (allBanned) {
      panel.classList.add("all-banned");
      btn.classList.add("active");
      btn.textContent = "✅ 全員アク禁中 (解除)";
    } else {
      panel.classList.remove("all-banned");
      btn.classList.remove("active");
      btn.textContent = "全員アク禁";
    }
    desc.textContent = "アク禁リスト: " + banList.length + "人" + (allBanned ? " ／ ⚠ 全員アク禁中" : "");

    // タグ描画
    if (banList.length === 0) {
      tagsEl.innerHTML = '<span style="font-size:12px;color:var(--text-muted);">アク禁ユーザーなし</span>';
    } else {
      tagsEl.innerHTML = banList.map((name, i) =>
        '<div class="ban-tag">' + escapeHTML(name) +
        '<button onclick="removeBan(' + i + ')">×</button></div>'
      ).join('');
    }
  }

  // アク禁追加
  window.addBanName = async function() {
    const input = document.getElementById("banNameInput");
    const name  = input.value.trim();
    if (!name) return;
    if (banList.includes(name)) { showToast("既にアク禁済みです"); return; }
    banList.push(name);
    input.value = '';
    await saveBanList();
    renderBanList();
    showToast("🚫 「" + name + "」をアク禁しました");
  };

  // アク禁解除
  window.removeBan = async function(i) {
    const name = banList[i];
    banList.splice(i, 1);
    await saveBanList();
    renderBanList();
    showToast("✅ 「" + name + "」のアク禁を解除しました");
  };

  // 全員アク禁トグル
  window.toggleAllBan = async function() {
    allBanned = !allBanned;
    await saveBanList();
    renderBanList();
    showToast(allBanned ? "🚫 全員アク禁にしました" : "✅ 全員アク禁を解除しました");
  };

  // Enterキーでアク禁追加
  document.getElementById("banNameInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") window.addBanName();
  });

  // ========================================
  // 表示モード管理
  // ========================================
  const modeLabels = {
    iframe:  'iframeで表示（今のページのまま）',
    kanri2:  'kanri2.html を開く（待機管理）',
    peji:    'peji.html を開く（隠しページ）'
  };

  async function loadDisplayMode() {
    try {
      const snap = await getDoc(doc(db, "config", "displayMode"));
      const mode = snap.exists() ? (snap.data().mode || "iframe") : "iframe";
      updateModeBtns(mode);
    } catch(e) { updateModeBtns("iframe"); }
  }

  function updateModeBtns(mode) {
    document.getElementById("modeBtn1").classList.toggle("active", mode === "iframe");
    document.getElementById("modeBtn2").classList.toggle("active", mode === "kanri2");
    document.getElementById("modeBtn3").classList.toggle("active", mode === "peji");
    document.getElementById("modeDesc").textContent = "現在: " + (modeLabels[mode] || mode);
  }

  window.setDisplayMode = async function(mode) {
    try {
      await setDoc(doc(db, "config", "displayMode"), { mode });
      updateModeBtns(mode);
      showToast("✅ 表示モードを変更しました: " + (modeLabels[mode] || mode));
    } catch(e) { showToast("エラー: " + e.message); }
  };

  // ========================================
  // 初期ロード
  // ========================================
  loadPublicMode();
  loadUsers();
  loadBanList();
  loadDisplayMode();
  loadUserPageModes();
</script>
</body>
</html>
