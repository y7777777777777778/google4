<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>アクセス管理 - 管理画面</title>

<style>
  /* ===== リセット & ベース ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0f1117;
    --surface:    #1a1d27;
    --surface2:   #22263a;
    --border:     #2e3354;
    --text:       #e8eaf6;
    --text-muted: #8b92b8;
    --ok:         #00e676;
    --wait:       #ffb300;
    --ng:         #ff5252;
    --accent:     #5c6bc0;
    --accent2:    #7986cb;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', 'Consolas', monospace;
    min-height: 100vh;
  }

  /* ===== ヘッダー ===== */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text);
  }

  header span.subtitle {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  /* ===== ステータスバー（件数表示） ===== */
  .stats-bar {
    display: flex;
    gap: 20px;
    padding: 20px 32px;
    flex-wrap: wrap;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 120px;
  }

  .stat-card .stat-num {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .stat-card .stat-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .stat-card.total  .stat-num { color: var(--accent2); }
  .stat-card.ok     .stat-num { color: var(--ok); }
  .stat-card.wait   .stat-num { color: var(--wait); }
  .stat-card.ng     .stat-num { color: var(--ng); }

  /* ===== ツールバー ===== */
  .toolbar {
    padding: 0 32px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .search-wrap {
    position: relative;
  }
  .search-wrap input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 9px 14px 9px 36px;
    font-size: 13px;
    font-family: inherit;
    width: 260px;
    outline: none;
    transition: border 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-wrap::before {
    content: "🔍";
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    pointer-events: none;
  }

  .refresh-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text-muted);
    padding: 9px 16px; font-size: 13px; cursor: pointer;
    font-family: inherit;
    transition: border 0.15s, color 0.15s;
  }
  .refresh-btn:hover { border-color: var(--accent2); color: var(--text); }

  /* ===== テーブル ===== */
  .table-wrap {
    margin: 0 32px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  thead th {
    padding: 14px 20px;
    text-align: left;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
    font-weight: 600;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  tbody td {
    padding: 14px 20px;
    vertical-align: middle;
  }

  /* ===== ユーザー名セル ===== */
  .user-name {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .user-name-text { font-weight: 500; }

  /* ===== ステータスバッジ ===== */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .badge::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .badge-ok   { background: rgba(0,230,118,0.12); color: var(--ok); border: 1px solid rgba(0,230,118,0.3); }
  .badge-ok::before { background: var(--ok); }
  .badge-wait { background: rgba(255,179,0,0.12); color: var(--wait); border: 1px solid rgba(255,179,0,0.3); }
  .badge-wait::before { background: var(--wait); animation: blink 1.4s infinite; }
  .badge-ng   { background: rgba(255,82,82,0.12); color: var(--ng); border: 1px solid rgba(255,82,82,0.3); }
  .badge-ng::before { background: var(--ng); }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ===== 操作ボタン ===== */
  .action-btns { display: flex; gap: 8px; align-items: center; }

  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    border: 1px solid transparent;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-ok {
    background: rgba(0,230,118,0.12);
    border-color: rgba(0,230,118,0.35);
    color: var(--ok);
  }
  .btn-ok:hover:not(:disabled) {
    background: rgba(0,230,118,0.25);
    border-color: var(--ok);
  }

  .btn-ng {
    background: rgba(255,179,0,0.10);
    border-color: rgba(255,179,0,0.35);
    color: var(--wait);
  }
  .btn-ng:hover:not(:disabled) {
    background: rgba(255,179,0,0.22);
    border-color: var(--wait);
  }

  .btn-del {
    background: rgba(255,82,82,0.10);
    border-color: rgba(255,82,82,0.3);
    color: var(--ng);
    width: 32px; height: 32px;
    padding: 0; display: flex; align-items: center; justify-content: center;
    font-size: 15px; border-radius: 6px;
  }
  .btn-del:hover:not(:disabled) {
    background: rgba(255,82,82,0.22);
    border-color: var(--ng);
  }

  /* ===== ローディング / 空状態 ===== */
  .loading-row td, .empty-row td {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .spinner {
    display: inline-block;
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== トースト ===== */
  #toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 100;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }

  /* ===== 確認ダイアログ ===== */
  #confirmOverlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200; justify-content: center; align-items: center;
  }
  #confirmOverlay.active { display: flex; }

  #confirmBox {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 28px;
    width: 340px;
    text-align: center;
    animation: modalIn 0.18s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.9); }
    to   { opacity: 1; transform: scale(1); }
  }
  #confirmBox h3 {
    font-size: 16px; margin-bottom: 10px; color: var(--ng);
  }
  #confirmBox p {
    font-size: 13px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6;
  }
  #confirmBox .confirm-btns { display: flex; gap: 10px; justify-content: center; }
  #confirmBox .btn-confirm-cancel {
    padding: 10px 20px; border-radius: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-muted); font-size: 13px; cursor: pointer;
    font-family: inherit;
  }
  #confirmBox .btn-confirm-ok {
    padding: 10px 20px; border-radius: 6px;
    background: rgba(255,82,82,0.18); border: 1px solid var(--ng);
    color: var(--ng); font-size: 13px; cursor: pointer;
    font-family: inherit; font-weight: 700;
  }

  /* ===== レスポンシブ ===== */
  @media (max-width: 600px) {
    .table-wrap { margin: 0 16px 24px; }
    .stats-bar, .toolbar { padding: 16px; }
    header { padding: 0 16px; }
    .search-wrap input { width: 100%; }
  }
</style>
</head>

<body>

<!-- ========== ヘッダー ========== -->
<header>
  <div class="header-left">
    <div class="header-icon">🔐</div>
    <div>
      <h1>ACCESS CONTROL PANEL</h1>
      <span class="subtitle">ユーザーアクセス管理システム</span>
    </div>
  </div>
</header>

<!-- ========== ステータス統計カード ========== -->
<div class="stats-bar">
  <div class="stat-card total">
    <span class="stat-num" id="countTotal">-</span>
    <span class="stat-label">Total</span>
  </div>
  <div class="stat-card ok">
    <span class="stat-num" id="countOk">-</span>
    <span class="stat-label">許可</span>
  </div>
  <div class="stat-card wait">
    <span class="stat-num" id="countWait">-</span>
    <span class="stat-label">待機中</span>
  </div>
  <div class="stat-card ng">
    <span class="stat-num" id="countNg">-</span>
    <span class="stat-label">拒否</span>
  </div>
</div>

<!-- ========== ツールバー ========== -->
<div class="toolbar">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="名前で絞り込み...">
  </div>
  <button class="refresh-btn" id="refreshBtn">
    🔄 更新
  </button>
</div>

<!-- ========== ユーザーテーブル ========== -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:40%">Name</th>
        <th style="width:20%">Status</th>
        <th style="width:40%">操作</th>
      </tr>
    </thead>
    <tbody id="userTableBody">
      <!-- JSで動的生成 -->
      <tr class="loading-row">
        <td colspan="3">
          <div class="spinner"></div><br>
          読み込み中...
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- ========== トースト ========== -->
<div id="toast"></div>

<!-- ========== 削除確認ダイアログ ========== -->
<div id="confirmOverlay">
  <div id="confirmBox">
    <h3>⚠ ユーザーを削除しますか？</h3>
    <p id="confirmMsg">このユーザーのデータを完全に削除します。<br>削除すると再度 Name 入力が可能になります。</p>
    <div class="confirm-btns">
      <button class="btn-confirm-cancel" id="confirmCancelBtn">キャンセル</button>
      <button class="btn-confirm-ok"     id="confirmOkBtn">削除する</button>
    </div>
  </div>
</div>


<!-- ========== Firebase SDK ========== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    getDocs,
    doc,
    updateDoc,
    deleteDoc,
    orderBy,
    query
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  // ----------------------------------------
  // Firebase 設定（ここに自分の設定を入れる）
  // ----------------------------------------
  const firebaseConfig = {
    apiKey:            "AIzaSyAdQbSXJbRkd0C29O0hW5FgHERR_Vh9FZw",
    authDomain:        "fir-d5882.firebaseapp.com",
    projectId:         "fir-d5882",
    storageBucket:     "fir-d5882.firebasestorage.app",
    messagingSenderId: "68351757634",
    appId:             "1:68351757634:web:0e33ac84b7f1671939ccdb"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ========================================
  // DOM要素
  // ========================================
  const tbody         = document.getElementById("userTableBody");
  const searchInput   = document.getElementById("searchInput");
  const refreshBtn    = document.getElementById("refreshBtn");
  const toast         = document.getElementById("toast");
  const confirmOverlay = document.getElementById("confirmOverlay");
  const confirmMsg    = document.getElementById("confirmMsg");
  const confirmOkBtn  = document.getElementById("confirmOkBtn");
  const confirmCancelBtn = document.getElementById("confirmCancelBtn");

  // カウンター
  const countTotal = document.getElementById("countTotal");
  const countOk    = document.getElementById("countOk");
  const countWait  = document.getElementById("countWait");
  const countNg    = document.getElementById("countNg");

  // ユーザーデータのキャッシュ
  let allUsers = [];
  // 削除確認用コールバック
  let pendingDeleteId = null;

  // ========================================
  // トースト表示
  // ========================================
  function showToast(msg, duration = 3000) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), duration);
  }

  // ========================================
  // アバター文字（名前の頭文字）
  // ========================================
  function getInitial(name) {
    if (!name) return "?";
    // 日本語なら最初の1文字、英語なら大文字
    return name.charAt(0).toUpperCase();
  }

  // ========================================
  // ステータスバッジHTMLを生成
  // ========================================
  function badgeHTML(status) {
    const map = {
      ok:   { cls: "badge-ok",   label: "許可" },
      wait: { cls: "badge-wait", label: "待機中" },
      ng:   { cls: "badge-ng",   label: "拒否" }
    };
    const info = map[status] || { cls: "", label: status };
    return `<span class="badge ${info.cls}">${info.label}</span>`;
  }

  // ========================================
  // テーブルを描画（フィルタ対応）
  // ========================================
  function renderTable(users) {
    // 統計カードを更新
    countTotal.textContent = users.length;
    countOk.textContent    = users.filter(u => u.status === "ok").length;
    countWait.textContent  = users.filter(u => u.status === "wait").length;
    countNg.textContent    = users.filter(u => u.status === "ng").length;

    // 検索フィルタ
    const q = searchInput.value.trim().toLowerCase();
    const filtered = q
      ? users.filter(u => u.name.toLowerCase().includes(q))
      : users;

    // テーブル描画
    if (filtered.length === 0) {
      tbody.innerHTML = `
        <tr class="empty-row">
          <td colspan="3">ユーザーが見つかりません</td>
        </tr>`;
      return;
    }

    tbody.innerHTML = filtered.map(user => `
      <tr data-id="${user.id}">
        <!-- Name -->
        <td>
          <div class="user-name">
            <div class="user-avatar">${getInitial(user.name)}</div>
            <span class="user-name-text">${escapeHTML(user.name)}</span>
          </div>
        </td>
        <!-- Status -->
        <td>${badgeHTML(user.status)}</td>
        <!-- 操作ボタン -->
        <td>
          <div class="action-btns">
            <button
              class="btn btn-ok"
              onclick="handleAllow('${user.id}', '${escapeHTML(user.name)}')"
              ${user.status === 'ok' ? 'disabled' : ''}
            >✓ 許可</button>
            <button
              class="btn btn-ng"
              onclick="handleDeny('${user.id}', '${escapeHTML(user.name)}')"
              ${user.status === 'ng' ? 'disabled' : ''}
            >✕ 拒否</button>
            <button
              class="btn btn-del"
              onclick="handleDelete('${user.id}', '${escapeHTML(user.name)}')"
              title="削除"
            >🗑</button>
          </div>
        </td>
      </tr>
    `).join("");
  }

  // XSS対策
  function escapeHTML(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  // ========================================
  // Firestoreからユーザー一覧を取得
  // ========================================
  async function loadUsers() {
    tbody.innerHTML = `
      <tr class="loading-row">
        <td colspan="3">
          <div class="spinner"></div><br>
          読み込み中...
        </td>
      </tr>`;
    try {
      let snapshot;
      try {
        const q = query(collection(db, "users"), orderBy("createdAt", "desc"));
        snapshot = await getDocs(q);
      } catch (indexErr) {
        console.warn("orderBy失敗、フォールバック:", indexErr.message);
        snapshot = await getDocs(collection(db, "users"));
      }
      allUsers = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderTable(allUsers);
    } catch (e) {
      console.error("取得エラー:", e);
      tbody.innerHTML = `
        <tr class="empty-row">
          <td colspan="3">
            ⚠ データ取得に失敗しました<br>
            <small style="color:#5d8a84;font-size:11px;display:block;margin-top:8px;">
              エラー: ${e.message}<br>
              Firestoreのセキュリティルールで read を許可しているか確認してください
            </small>
          </td>
        </tr>`;
      showToast("エラー: " + e.message, 6000);
    }
  }

  // ========================================
  // 許可ボタン処理 → status を "ok" に更新
  // ========================================
  window.handleAllow = async function(id, name) {
    try {
      await updateDoc(doc(db, "users", id), { status: "ok" });
      // ローカルキャッシュも更新
      const user = allUsers.find(u => u.id === id);
      if (user) user.status = "ok";
      renderTable(allUsers);
      showToast(`✅ 「${name}」を許可しました`);
    } catch (e) {
      console.error("更新エラー:", e);
      showToast("更新に失敗しました");
    }
  };

  // ========================================
  // 拒否ボタン処理 → status を "ng" に更新
  // ========================================
  window.handleDeny = async function(id, name) {
    try {
      await updateDoc(doc(db, "users", id), { status: "ng" });
      const user = allUsers.find(u => u.id === id);
      if (user) user.status = "ng";
      renderTable(allUsers);
      showToast(`🚫 「${name}」を拒否しました`);
    } catch (e) {
      console.error("更新エラー:", e);
      showToast("更新に失敗しました");
    }
  };

  // ========================================
  // 削除ボタン処理 → 確認ダイアログを表示
  // ========================================
  window.handleDelete = function(id, name) {
    pendingDeleteId = id;
    confirmMsg.innerHTML = `
      <strong style="color: var(--text)">${name}</strong> のデータを完全に削除します。<br>
      削除すると再度 Name 入力が可能になります。`;
    confirmOverlay.classList.add("active");
  };

  // 削除確認OK
  confirmOkBtn.addEventListener("click", async function() {
    if (!pendingDeleteId) return;
    const id = pendingDeleteId;
    confirmOverlay.classList.remove("active");
    const user = allUsers.find(u => u.id === id);
    const name = user ? user.name : "";
    try {
      await deleteDoc(doc(db, "users", id));
      allUsers = allUsers.filter(u => u.id !== id);
      renderTable(allUsers);
      showToast(`🗑 「${name}」を削除しました`);
    } catch (e) {
      console.error("削除エラー:", e);
      showToast("削除に失敗しました");
    }
    pendingDeleteId = null;
  });

  // 削除確認キャンセル
  confirmCancelBtn.addEventListener("click", function() {
    confirmOverlay.classList.remove("active");
    pendingDeleteId = null;
  });

  // 背景クリックでダイアログ閉じる
  confirmOverlay.addEventListener("click", function(e) {
    if (e.target === confirmOverlay) {
      confirmOverlay.classList.remove("active");
      pendingDeleteId = null;
    }
  });

  // ========================================
  // 検索フィルタ（リアルタイム）
  // ========================================
  searchInput.addEventListener("input", function() {
    renderTable(allUsers);
  });

  // ========================================
  // 更新ボタン
  // ========================================
  refreshBtn.addEventListener("click", function() {
    loadUsers();
    showToast("🔄 データを更新しています...", 1500);
  });

  // ========================================
  // 初期ロード
