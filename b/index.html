<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Google</title>
<link rel="icon" href="https://www.google.com/favicon.ico">

<style>
  /* ===== リセット & ベース ===== */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Roboto, Arial, sans-serif;
    background: #fff;
    color: #202124;
  }

  /* ===== ヘッダー ===== */
  header {
    display: flex;
    justify-content: space-between;
    padding: 14px 20px;
    font-size: 14px;
    height: 48px;
    align-items: center;
  }
  .left a, .right a {
    margin: 0 8px;
    text-decoration: none;
    color: #1f1f1f;
    font-size: 14px;
  }
  .left a:hover, .right a:hover { text-decoration: underline; }

  /* ===== メイン ===== */
  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 12%;
    text-align: center;
  }
  .logo img { width: 272px; height: 92px; }

  /* ===== 検索ボックス ===== */
  .search-box {
    margin-top: 30px;
    width: 580px;
    max-width: 92%;
    display: flex;
    align-items: center;
    border: 1px solid #dfe1e5;
    border-radius: 24px;
    padding: 6px 14px;
    background: #fff;
    transition: box-shadow 0.2s, border 0.2s;
  }
  .search-box:hover,
  .search-box:focus-within {
    box-shadow: 0 1px 6px rgba(32,33,36,.28);
    border-color: transparent;
  }
  .search-icon { width: 20px; opacity: 0.45; margin-right: 14px; margin-left: 4px; }
  .search-box input {
    flex: 1; border: none; outline: none;
    font-size: 16px; padding: 10px 4px;
  }
  .icon-btn {
    background: none; border: none; cursor: pointer;
    opacity: 0.55; margin-left: 10px;
  }
  .icon-btn img { width: 24px; }

  /* ===== ボタン ===== */
  .btns { margin-top: 28px; }
  .btns button {
    font-size: 14px; padding: 10px 20px; margin: 6px;
    border: 1px solid #f8f9fa; border-radius: 4px;
    background: #f8f9fa; cursor: pointer; transition: 0.15s;
  }
  .btns button:hover {
    border: 1px solid #dadce0;
    box-shadow: 0 1px 1px rgba(0,0,0,0.1);
  }

  /* ===== フッター ===== */
  footer {
    position: fixed; bottom: 0; width: 100%;
    background: #f2f2f2; font-size: 14px; color: #70757a;
    border-top: 1px solid #dadce0;
  }
  .footer-top { padding: 12px 30px; }
  .footer-bottom {
    display: flex; justify-content: space-between;
    padding: 10px 30px; border-top: 1px solid #dadce0;
  }
  .footer-bottom a {
    color: #70757a; margin-right: 18px; text-decoration: none;
  }
  .footer-bottom a:hover { text-decoration: underline; }

  /* ===== 隠しiframe（peji.html表示用） ===== */
  #hiddenFrame {
    display: none;
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    border: none; z-index: 999;
  }

  /* ===== オーバーレイ背景 ===== */
  #overlay {
    display: none;
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }
  #overlay.active { display: flex; }

  /* ===== Name入力モーダル ===== */
  #nameModal {
    background: #fff;
    border-radius: 12px;
    padding: 40px 36px;
    width: 360px;
    max-width: 92vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    text-align: center;
    animation: modalIn 0.22s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(-16px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  #nameModal h2 {
    font-size: 20px; font-weight: 600;
    color: #202124; margin-bottom: 8px;
  }
  #nameModal p {
    font-size: 13px; color: #70757a; margin-bottom: 24px;
  }
  #nameModal input {
    width: 100%; padding: 12px 16px;
    border: 1px solid #dfe1e5; border-radius: 8px;
    font-size: 15px; outline: none;
    transition: border 0.15s, box-shadow 0.15s;
    margin-bottom: 18px;
  }
  #nameModal input:focus {
    border-color: #1a73e8;
    box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
  }
  #nameModal .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  #nameModal .btn-cancel {
    padding: 10px 20px; border: 1px solid #dadce0;
    border-radius: 6px; background: #fff;
    color: #1a73e8; font-size: 14px; cursor: pointer;
    transition: background 0.12s;
  }
  #nameModal .btn-cancel:hover { background: #f1f3f4; }
  #nameModal .btn-submit {
    padding: 10px 22px; border: none;
    border-radius: 6px; background: #1a73e8;
    color: #fff; font-size: 14px; cursor: pointer;
    transition: background 0.12s;
  }
  #nameModal .btn-submit:hover { background: #1557b0; }
  #nameModal .btn-submit:disabled {
    background: #aac4f0; cursor: not-allowed;
  }

  /* ===== トースト通知 ===== */
  #toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #323232; color: #fff;
    padding: 12px 24px; border-radius: 6px;
    font-size: 14px; opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 2000; pointer-events: none;
  }
  #toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }
</style>
</head>

<body>

<!-- ========== ヘッダー ========== -->
<header>
  <div class="left">
    <a href="https://about.google/">Googleについて</a>
    <a href="https://store.google.com/">ストア</a>
  </div>
  <div class="right">
    <a href="#">ログイン</a>
    <a href="#">登録</a>
  </div>
</header>

<!-- ========== メインコンテンツ ========== -->
<main>
  <div class="logo">
    <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google">
  </div>

  <form onsubmit="return doSearch();">
    <div class="search-box">
      <img class="search-icon"
        src="https://www.gstatic.com/images/icons/material/system/1x/search_black_24dp.png" alt="">
      <input id="q" placeholder="検索または URL を入力" autocomplete="off">
      <button type="button" class="icon-btn">
        <img src="https://www.gstatic.com/images/icons/material/system/1x/mic_black_24dp.png" alt="">
      </button>
      <button type="button" class="icon-btn">
        <img src="https://www.gstatic.com/images/icons/material/system/1x/image_black_24dp.png" alt="">
      </button>
    </div>
    <div class="btns">
      <button type="submit">Google 検索</button>
      <button type="button">I'm Feeling Lucky</button>
    </div>
  </form>
</main>

<!-- ========== フッター ========== -->
<footer>
  <div class="footer-top">日本</div>
  <div class="footer-bottom">
    <div>
      <a href="https://ads.google.com/">広告</a>
      <a href="https://smallbusiness.withgoogle.com/">ビジネス</a>
      <a href="https://www.google.com/search/howsearchworks/">検索の仕組み</a>
    </div>
    <div>
      <a href="https://policies.google.com/privacy">プライバシー</a>
      <a href="https://policies.google.com/terms">利用規約</a>
    </div>
  </div>
</footer>

<!-- ========== peji.html 表示用 iframe ========== -->
<iframe id="hiddenFrame"></iframe>

<!-- ========== Name入力オーバーレイ ========== -->
<div id="overlay">
  <div id="nameModal">
    <h2>名前を入力してください</h2>
    <p>アクセス申請のためにあなたの名前が必要です。<br>管理者が承認するとアクセスできます。</p>
    <input type="text" id="nameInput" placeholder="例: 山田 太郎" maxlength="30">
    <div class="modal-btns">
      <button class="btn-cancel" id="cancelBtn">キャンセル</button>
      <button class="btn-submit" id="submitBtn">申請する</button>
    </div>
  </div>
</div>

<!-- ========== トースト ========== -->
<div id="toast"></div>

<!-- ========== Firebase SDK ========== -->
<script type="module">
  import { initializeApp }          from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, where, getDocs, doc, getDoc }
                                    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyAdQbSXJbRkd0C29O0hW5FgHERR_Vh9FZw",
    authDomain:        "fir-d5882.firebaseapp.com",
    projectId:         "fir-d5882",
    storageBucket:     "fir-d5882.firebasestorage.app",
    messagingSenderId: "68351757634",
    appId:             "1:68351757634:web:0e33ac84b7f1671939ccdb"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── ページ読み込み時にアク禁チェック ──
  (async function checkBan() {
    try {
      const savedName = localStorage.getItem("accessUserName");
      if (!savedName) return;
      // usersコレクションのstatusがngならgoogle.comへ
      const snap = await getDocs(query(collection(db, "users"), where("name", "==", savedName)));
      if (!snap.empty && snap.docs[0].data().status === "ng") {
        location.replace("https://www.google.com");
        return;
      }
      // アク禁リストチェック（config/banList）
      const banSnap = await getDoc(doc(db, "config", "banList"));
      if (banSnap.exists()) {
        const banned = banSnap.data().names || [];
        if (banned.includes(savedName)) {
          location.replace("https://www.google.com");
          return;
        }
      }
      // 全員アク禁チェック
      const allBanSnap = await getDoc(doc(db, "config", "banList"));
      if (allBanSnap.exists() && allBanSnap.data().allBanned === true) {
        location.replace("https://www.google.com");
      }
    } catch(e) { console.error("アク禁チェックエラー:", e); }
  })();

  const overlay     = document.getElementById("overlay");
  const nameInput   = document.getElementById("nameInput");
  const submitBtn   = document.getElementById("submitBtn");
  const cancelBtn   = document.getElementById("cancelBtn");
  const hiddenFrame = document.getElementById("hiddenFrame");
  const toast       = document.getElementById("toast");

  function showToast(msg, duration = 3000) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), duration);
  }

  async function getUserStatus(name) {
    const q        = query(collection(db, "users"), where("name", "==", name));
    const snapshot = await getDocs(q);
    if (snapshot.empty) return null;
    return snapshot.docs[0].data().status;
  }

  async function isPublicMode() {
    try {
      const snap = await getDocs(query(collection(db, "config"), where("key", "==", "publicMode")));
      if (snap.empty) return false;
      return snap.docs[0].data().value === true;
    } catch(e) { return false; }
  }

  async function nameExists(name) {
    const q = query(collection(db, "users"), where("name", "==", name));
    const snap = await getDocs(q);
    return !snap.empty;
  }

  async function registerUser(name) {
    const publicMode = await isPublicMode();
    await addDoc(collection(db, "users"), {
      name:      name,
      status:    publicMode ? "ok" : "wait",
      createdAt: new Date()
    });
    return publicMode;
  }

  function openModal() {
    nameInput.value = "";
    nameInput.style.borderColor = "";
    const errMsg = document.getElementById("nameErrMsg");
    if (errMsg) errMsg.textContent = "";
    overlay.classList.add("active");
    setTimeout(() => nameInput.focus(), 100);
  }
  function closeModal() {
    overlay.classList.remove("active");
  }

  // ユーザーごとの表示先URL
  const pageModeUrls = {
    peji: "https://googlecom-seven.vercel.app/peji.html",
    pej:  "https://googlecom-seven.vercel.app/b/pej.html"
  };

  let pejiLoaded = false;
  let currentUrl  = pageModeUrls.peji;

  // FirestoreからユーザーのpageModeを取得してURLを決定
  async function loadUserPageMode(name) {
    try {
      const q    = query(collection(db, "users"), where("name", "==", name));
      const snap = await getDocs(q);
      if (!snap.empty) {
        const mode = snap.docs[0].data().pageMode || "peji";
        currentUrl = pageModeUrls[mode] || pageModeUrls.peji;
      }
    } catch(e) {}
  }

  function openPeji() {
    if (!pejiLoaded || hiddenFrame.src !== currentUrl) {
      hiddenFrame.src = currentUrl;
      pejiLoaded = true;
    }
    hiddenFrame.style.display = "block";
  }
  function closePeji() {
    hiddenFrame.style.display = "none";
  }

  // Ctrl+U
  document.addEventListener("keydown", async function(e) {
    if (!(e.ctrlKey && e.key === "u")) return;
    e.preventDefault();

    if (hiddenFrame.style.display === "block") {
      closePeji();
      return;
    }

    const savedName = localStorage.getItem("accessUserName");
    if (!savedName) {
      openModal();
      return;
    }

    // キャッシュで即判定
    const cachedStatus = localStorage.getItem("accessStatus");
    if (cachedStatus === "ok") {
      await loadUserPageMode(savedName);
      openPeji();
      getUserStatus(savedName).then(s => {
        if (s && s !== "ok") localStorage.setItem("accessStatus", s);
      }).catch(() => {});
      return;
    }

    // Firestoreで確認
    try {
      const status = await getUserStatus(savedName);
      if (status) localStorage.setItem("accessStatus", status);
      if (status === "ok") {
        await loadUserPageMode(savedName);
        openPeji();
      } else if (!status) {
        localStorage.removeItem("accessUserName");
        localStorage.removeItem("accessStatus");
        openModal();
      }
    } catch (err) {
      console.error("Firestore エラー:", err);
    }
  });

  // 申請ボタン
  submitBtn.addEventListener("click", async function() {
    const name = nameInput.value.trim();
    if (!name) {
      nameInput.focus();
      nameInput.style.borderColor = "#ea4335";
      setTimeout(() => { nameInput.style.borderColor = ""; }, 1500);
      return;
    }

    submitBtn.disabled    = true;
    submitBtn.textContent = "確認中...";

    try {
      const exists = await nameExists(name);
      if (exists) {
        nameInput.style.borderColor = "#ea4335";
        submitBtn.disabled    = false;
        submitBtn.textContent = "申請する";
        let errMsg = document.getElementById("nameErrMsg");
        if (!errMsg) {
          errMsg = document.createElement("p");
          errMsg.id = "nameErrMsg";
          errMsg.style.cssText = "color:#ea4335;font-size:12px;margin:-10px 0 10px;text-align:left;";
          nameInput.parentNode.insertBefore(errMsg, nameInput.nextSibling);
        }
        errMsg.textContent = "その名前は既に使われています。別の名前にしてください。";
        nameInput.focus();
        return;
      }
      const isPublic = await registerUser(name);
      localStorage.setItem("accessUserName", name);
      localStorage.setItem("accessStatus", isPublic ? "ok" : "wait");
      closeModal();
      if (isPublic) openPeji();
    } catch (err) {
      console.error("登録エラー:", err);
    }

    submitBtn.disabled    = false;
    submitBtn.textContent = "申請する";
  });

  nameInput.addEventListener("keydown", e => { if (e.key === "Enter") submitBtn.click(); });
  cancelBtn.addEventListener("click", closeModal);
  overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });

  window.doSearch = function() {
    const q = document.getElementById("q").value.trim();
    if (q) location.href = "https://www.google.com/search?q=" + encodeURIComponent(q);
    return false;
  };

</script>
</body>
</html>
