<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>隠しページ</title>
  <style>
    body {
      margin: 0;
      font-family: "Roboto", "Google Sans", "Segoe UI", Arial, sans-serif;
      background: #f8f9fa;
      color: #222;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ============================
        ★ Googleサービス風ヘッダー
       ============================ */
    .header {
      background: #ffffff;
      padding: 14px 22px;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .header button {
      background: #ffffff;
      border: 1px solid #dadce0;
      color: #222;
      padding: 6px 16px;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    .header button:hover {
      background: #f1f3f4;
      border-color: #c5c5c5;
    }

    /* ============================
        ★ メニュー部分（カード風）
       ============================ */
    .menu {
      display: flex;
      flex-direction: column;
      padding: 26px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      margin-top: 16px;
    }

    .item {
      text-align: center;
    }

    /* ============================
        ★ Googleのカードっぽいボタン
       ============================ */
    .btn-site {
      width: 100%;
      padding: 18px 0;
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e0e0e0;
      box-shadow: 0 3px 12px rgba(0,0,0,0.06);
      font-size: 17px;
      cursor: pointer;
      transition: 0.25s;
    }

    .btn-site:hover {
      background: #fff;
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }

    .desc {
      margin-top: 12px;
      font-size: 14px;
      color: #5e5e5e;
    }

    /* ============================
        ★ iframe（ページ内切替）
       ============================ */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      background: #fff;
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <div class="header">
    <span>隠しページ</span>
    <button onclick="goBack()">戻る</button>
  </div>

  <!-- メニュー -->
  <div class="menu" id="menu">
    <p style="text-align:center; margin-bottom: 25px; font-size:15px; color:#666;">
      チャットサイトはサーバーの関係上、起動が遅いです。
    </p>

    <div class="grid">

      <div class="item">
        <button class="btn-site"
          onclick="openSite('https://0c884609-16ce-4d6c-a856-9be09f098e00.web.createdevserver.com/')">
          チャットサイト
        </button>
        <div class="desc">読み込みに時間がかかる場合があります</div>
      </div>

      <div class="item">
        <button class="btn-site" onclick="openSite('ifame.html')">
          iframeサイト（履歴なし）
        </button>
        <div class="desc">iframeで開く軽量版</div>
      </div>

      <div class="item">
        <button class="btn-site"
          onclick="openSite('https://sozaihaihu.vercel.app/index2.html')">
          素材配布
        </button>
        <div class="desc">パスワード：syutaisei</div>
      </div>

      <div class="item">
        <button class="btn-site" onclick="window.open('https://x.gd/rirekiume','_blank')">
          履歴埋め（Google風）
        </button>
        <div class="desc">別タブで開きます</div>
      </div>

    </div>
  </div>

  <!-- 内部ページ iframe -->
  <iframe id="iframe"></iframe>

  <script>
    function goBack() {
      document.getElementById("iframe").style.display = "none";
      document.getElementById("menu").style.display = "block";
    }

    function openSite(url) {
      const iframe = document.getElementById("iframe");
      document.getElementById("menu").style.display = "none";
      iframe.style.display = "block";
      iframe.src = url;
    }
  </script>

</body>
</html>
