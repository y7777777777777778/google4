<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クラス 1</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #020408;
    --panel:   rgba(0,255,231,0.03);
    --border:  rgba(0,255,231,0.12);
    --border2: rgba(0,255,231,0.25);
    --accent:  #00ffe7;
    --accent2: #00a8ff;
    --text:    #c8f0ec;
    --dim:     #3a6660;
    --dim2:    #1e3835;
    --red:     #ff4466;
    --green:   #3dd68c;
    --mono:    'Share Tech Mono', monospace;
    --head:    'Rajdhani', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--mono);
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column;
    overflow: hidden;
  }
  body::after {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 44px 44px;
  }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: repeating-linear-gradient(
      0deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px,
      transparent 1px, transparent 3px
    );
  }
  .bottom-line {
    position: fixed; bottom: 0; left: 0; right: 0; height: 2px; z-index: 20;
    background: linear-gradient(90deg, transparent, var(--accent2), var(--accent), var(--accent2), transparent);
    background-size: 200% 100%;
    animation: scanMove 3s linear infinite;
  }
  @keyframes scanMove { from{background-position:100% 0} to{background-position:-100% 0} }
  @keyframes blink { 0%,100%{opacity:1} 60%{opacity:.3} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* ヘッダー */
  .header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    height: 54px; padding: 0 24px;
    background: rgba(0,0,0,0.85);
    border-bottom: 1px solid var(--border2);
    flex-shrink: 0;
  }
  .header-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--head); font-size: 18px; font-weight: 700;
    letter-spacing: .15em; color: var(--accent);
    text-shadow: 0 0 20px rgba(0,255,231,0.4);
  }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 8px var(--green);
    animation: blink 2s ease-in-out infinite;
  }
  .class-badge {
    font-size: 10px; letter-spacing: .12em;
    color: var(--accent2); border: 1px solid rgba(0,168,255,.3);
    background: rgba(0,168,255,.06); border-radius: 4px;
    padding: 3px 10px;
  }

  /* メイン */
  .main {
    position: relative; z-index: 2;
    flex: 1; overflow-y: auto; padding: 24px;
  }
  .main::-webkit-scrollbar { width: 3px; }
  .main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* セクションヘッド */
  .sec {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    animation: fadeUp .4s ease both;
  }
  .sec-tag { font-size: 10px; letter-spacing: .2em; color: var(--accent); text-transform: uppercase; }
  .sec-bar { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border2), transparent); }
  .sec-num { font-size: 10px; color: var(--dim2); }

  /* サイトグリッド */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }

  /* サイトカード */
  .site-card {
    background: var(--panel);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 18px 16px;
    cursor: pointer;
    display: flex; flex-direction: column; gap: 8px;
    position: relative; overflow: hidden;
    transition: all .2s;
    animation: fadeUp .4s ease both;
  }
  .site-card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 100%; height: 2px; background: var(--accent);
    opacity: 0; transition: opacity .2s;
  }
  .site-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,255,231,0.08);
  }
  .site-card:hover::before { opacity: 1; }
  .site-num { font-size: 9px; color: var(--dim2); letter-spacing: .12em; }
  .site-name {
    font-family: var(--head); font-size: 15px; font-weight: 600;
    color: var(--text); letter-spacing: .04em;
    transition: color .2s;
  }
  .site-card:hover .site-name { color: var(--accent); }
  .site-url { font-size: 10px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .site-arrow {
    align-self: flex-end; font-size: 13px; color: var(--dim2);
    transition: color .2s, transform .2s;
  }
  .site-card:hover .site-arrow { color: var(--accent); transform: translate(2px,-2px); }

  /* 空状態 */
  .empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 80px 20px;
    gap: 14px; color: var(--dim); text-align: center;
    animation: fadeUp .5s ease both;
  }
  .empty-icon { font-size: 36px; opacity: .35; }
  .empty-title { font-family: var(--head); font-size: 14px; letter-spacing: .1em; color: var(--dim); }
  .empty-desc { font-size: 11px; color: var(--dim2); line-height: 1.7; }

  /* ローディング */
  .loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 60px; gap: 12px; color: var(--dim);
  }
  .spinner {
    width: 22px; height: 22px;
    border: 2px solid var(--border2); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { font-size: 11px; letter-spacing: .12em; }

  /* iframeエリア */
  #iframeWrap {
    display: none; flex-direction: column;
    flex: 1; overflow: hidden; position: relative; z-index: 10;
  }
  .iframe-bar {
    display: flex; align-items: center; gap: 10px;
    height: 40px; padding: 0 16px;
    background: rgba(0,0,0,0.8);
    border-bottom: 1px solid var(--border2); flex-shrink: 0;
  }
  .iframe-bar-btn {
    font-family: var(--mono); font-size: 11px; letter-spacing: .08em;
    padding: 6px 16px; border: 1px solid var(--border2); border-radius: 4px;
    background: rgba(0,255,231,0.05); color: var(--text);
    cursor: pointer; transition: all .15s; text-transform: uppercase;
  }
  .iframe-bar-btn:hover { color: var(--accent); border-color: var(--accent); }
  .iframe-title { font-size: 11px; color: var(--dim); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: .04em; }
  #iframe { width: 100%; flex: 1; border: none; display: block; }
</style>
</head>
<body>

<div class="bottom-line"></div>

<!-- ヘッダー -->
<div class="header">
  <div class="header-logo">
    <div class="logo-dot"></div>
    CLASS
    <span class="class-badge">1</span>
  </div>
  <div id="siteCount" style="font-size:10px;color:var(--dim);letter-spacing:.08em;"></div>
</div>

<!-- メイン -->
<div class="main" id="mainArea">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">読み込み中...</div>
  </div>
</div>

<!-- iframeエリア -->
<div id="iframeWrap">
  <div class="iframe-bar">
    <button class="iframe-bar-btn" onclick="goBack()">← BACK</button>
    <span class="iframe-title" id="iframeTitle"></span>
  </div>
  <iframe id="iframe" allowfullscreen></iframe>
</div>

<script type="module">
  import { initializeApp }  from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, query, orderBy, onSnapshot }
    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyAdQbSXJbRkd0C29O0hW5FgHERR_Vh9FZw",
    authDomain:        "fir-d5882.firebaseapp.com",
    projectId:         "fir-d5882",
    storageBucket:     "fir-d5882.firebasestorage.app",
    messagingSenderId: "68351757634",
    appId:             "1:68351757634:web:0e33ac84b7f1671939ccdb"
  };

  const app = initializeApp(firebaseConfig, "class1");
  const db  = getFirestore(app);

  // クラスID（このファイルは1固定、他クラスはここを変える）
  const CLASS_ID = "1";

  const mainArea  = document.getElementById('mainArea');
  const siteCount = document.getElementById('siteCount');

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // サイトを開く
  window.openSite = function(url, name) {
    document.getElementById('mainArea').style.display = 'none';
    const wrap = document.getElementById('iframeWrap');
    wrap.style.display = 'flex';
    document.getElementById('iframeTitle').textContent = name;
    document.getElementById('iframe').src = url;
  };

  // 戻る
  window.goBack = function() {
    document.getElementById('iframeWrap').style.display = 'none';
    document.getElementById('iframe').src = '';
    document.getElementById('mainArea').style.display = 'block';
  };

  // サイト一覧をリアルタイム取得
  const q = query(
    collection(db, "classes", CLASS_ID, "sites"),
    orderBy("createdAt", "asc")
  );

  onSnapshot(q, snap => {
    const sites = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    siteCount.textContent = sites.length + ' SITES';

    if (sites.length === 0) {
      mainArea.innerHTML =
        '<div class="empty">' +
          '<div class="empty-icon">📭</div>' +
          '<div class="empty-title">NO SITES</div>' +
          '<div class="empty-desc">管理者が何も追加していません。</div>' +
        '</div>';
      return;
    }

    let html = '<div class="sec"><span class="sec-tag">// SITES</span><div class="sec-bar"></div><span class="sec-num">' + sites.length + ' entries</span></div>';
    html += '<div class="grid">';
    sites.forEach((site, i) => {
      html +=
        '<div class="site-card" onclick="openSite(\'' + esc(site.url) + '\', \'' + esc(site.name) + '\')" style="animation-delay:' + (i * 0.05) + 's">' +
          '<div class="site-num">SITE_' + String(i+1).padStart(2,'0') + '</div>' +
          '<div class="site-name">' + esc(site.name) + '</div>' +
          '<div class="site-url">' + esc(site.url) + '</div>' +
          '<span class="site-arrow">→</span>' +
        '</div>';
    });
    html += '</div>';
    mainArea.innerHTML = html;
  });
</script>
</body>
</html>
