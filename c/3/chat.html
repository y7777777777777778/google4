<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クラス3 チャット</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #020408;
    --panel:   rgba(0,255,231,0.03);
    --border:  rgba(0,255,231,0.12);
    --border2: rgba(0,255,231,0.25);
    --accent:  #00ffe7;
    --accent2: #00a8ff;
    --text:    #c8f0ec;
    --dim:     #3a6660;
    --dim2:    #1e3835;
    --red:     #ff4466;
    --green:   #3dd68c;
    --amber:   #ffb300;
    --mono:    'Share Tech Mono', monospace;
    --head:    'Rajdhani', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--mono);
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column;
    overflow: hidden;
  }
  body::after {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 44px 44px;
  }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: repeating-linear-gradient(
      0deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px,
      transparent 1px, transparent 3px
    );
  }
  @keyframes blink { 0%,100%{opacity:1} 60%{opacity:.3} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  @keyframes scanMove { from{background-position:100% 0} to{background-position:-100% 0} }

  .bottom-line {
    position: fixed; bottom: 0; left: 0; right: 0; height: 2px; z-index: 20;
    background: linear-gradient(90deg, transparent, var(--accent2), var(--accent), var(--accent2), transparent);
    background-size: 200% 100%;
    animation: scanMove 3s linear infinite;
  }

  /* ── ヘッダー ── */
  .header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    height: 54px; padding: 0 20px;
    background: rgba(0,0,0,0.85);
    border-bottom: 1px solid var(--border2); flex-shrink: 0;
  }
  .header-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--head); font-size: 18px; font-weight: 700;
    letter-spacing: .15em; color: var(--accent);
    text-shadow: 0 0 20px rgba(0,255,231,0.4);
  }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 8px var(--green);
    animation: blink 2s ease-in-out infinite;
  }
  .class-badge {
    font-size: 10px; letter-spacing: .12em; color: var(--accent2);
    border: 1px solid rgba(0,168,255,.3); background: rgba(0,168,255,.06);
    border-radius: 4px; padding: 3px 10px;
  }
  .online-wrap {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; color: var(--dim); letter-spacing: .08em;
  }
  .online-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green);
    animation: blink 2s ease-in-out infinite;
  }

  /* ── 名前設定バー（初回） ── */
  #nameBar {
    position: relative; z-index: 10;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px;
    background: rgba(0,255,231,0.04);
    border-bottom: 1px solid var(--border2);
    flex-shrink: 0;
  }
  .name-bar-label { font-size: 10px; letter-spacing: .1em; color: var(--accent); white-space: nowrap; }
  #nameInputBar {
    flex: 1; background: rgba(0,255,231,0.04);
    border: 1px solid var(--border2); border-radius: 4px;
    color: var(--text); font-family: var(--mono);
    font-size: 12px; padding: 7px 12px; outline: none;
    transition: border .15s; max-width: 220px;
  }
  #nameInputBar:focus { border-color: var(--accent); }
  #nameInputBar::placeholder { color: var(--dim2); }
  .name-warn { font-size: 10px; color: var(--amber); letter-spacing: .04em; }
  .name-set-btn {
    font-family: var(--mono); font-size: 10px; letter-spacing: .08em;
    padding: 7px 16px; border: 1px solid rgba(61,214,140,.4); border-radius: 4px;
    background: rgba(61,214,140,.07); color: var(--green);
    cursor: pointer; transition: all .15s; text-transform: uppercase;
  }
  .name-set-btn:hover { background: rgba(61,214,140,.18); border-color: var(--green); }

  /* ── メッセージエリア ── */
  #msgsArea {
    position: relative; z-index: 2;
    flex: 1; overflow-y: auto;
    padding: 16px 20px;
    display: flex; flex-direction: column; gap: 2px;
  }
  #msgsArea::-webkit-scrollbar { width: 3px; }
  #msgsArea::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* 日付区切り */
  .date-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 12px 0 8px;
  }
  .date-divider span {
    font-size: 9px; letter-spacing: .12em; color: var(--dim2);
    white-space: nowrap;
  }
  .date-divider::before, .date-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* メッセージ行 */
  .msg-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 4px 0;
    animation: fadeUp .2s ease both;
  }
  .msg-row.me { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    background: rgba(0,255,231,0.1); border: 1px solid rgba(0,255,231,0.2);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--head); font-size: 12px; font-weight: 700;
    color: var(--accent); margin-top: 2px;
  }
  .msg-row.me .msg-avatar { background: rgba(0,168,255,0.12); border-color: rgba(0,168,255,0.25); color: var(--accent2); }

  .msg-body { display: flex; flex-direction: column; gap: 3px; max-width: 70%; }
  .msg-row.me .msg-body { align-items: flex-end; }

  .msg-meta {
    display: flex; align-items: baseline; gap: 7px;
  }
  .msg-row.me .msg-meta { flex-direction: row-reverse; }
  .msg-name { font-size: 10px; letter-spacing: .06em; color: var(--accent2); }
  .msg-row.me .msg-name { color: var(--accent); }
  .msg-time { font-size: 9px; color: var(--dim2); }

  .msg-bubble {
    background: rgba(0,255,231,0.06);
    border: 1px solid rgba(0,255,231,0.12);
    border-radius: 0 8px 8px 8px;
    padding: 8px 12px;
    font-size: 12px; color: var(--text);
    line-height: 1.6; word-break: break-all;
    max-width: 100%;
  }
  .msg-row.me .msg-bubble {
    background: rgba(0,168,255,0.08);
    border-color: rgba(0,168,255,0.18);
    border-radius: 8px 0 8px 8px;
    color: #d0eeff;
  }

  /* システムメッセージ */
  .msg-system {
    text-align: center; font-size: 10px;
    color: var(--dim2); letter-spacing: .08em;
    padding: 4px 0; margin: 4px 0;
  }

  /* ── 入力エリア ── */
  .input-area {
    position: relative; z-index: 10;
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px 12px;
    background: rgba(0,0,0,0.6);
    border-top: 1px solid var(--border2);
    flex-shrink: 0;
  }
  #chatInput {
    flex: 1; background: rgba(0,255,231,0.04);
    border: 1px solid var(--border2); border-radius: 6px;
    color: var(--text); font-family: var(--mono);
    font-size: 12px; padding: 10px 14px; outline: none;
    transition: border .15s; resize: none; height: 40px;
  }
  #chatInput:focus { border-color: var(--accent); }
  #chatInput::placeholder { color: var(--dim2); }
  #chatInput:disabled { opacity: .4; cursor: not-allowed; }
  #sendBtn {
    font-family: var(--mono); font-size: 11px; letter-spacing: .08em;
    padding: 10px 20px; border: 1px solid var(--border2); border-radius: 6px;
    background: rgba(0,255,231,0.06); color: var(--accent);
    cursor: pointer; transition: all .15s; text-transform: uppercase;
    white-space: nowrap; height: 40px; flex-shrink: 0;
  }
  #sendBtn:hover { background: rgba(0,255,231,0.14); border-color: var(--accent); box-shadow: 0 0 14px rgba(0,255,231,0.15); }
  #sendBtn:disabled { opacity: .3; cursor: not-allowed; box-shadow: none; }

  /* 閉鎖バナー */
  #closedBanner {
    display: none;
    position: relative; z-index: 10;
    text-align: center; padding: 10px;
    background: rgba(255,179,0,0.08);
    border-top: 1px solid rgba(255,179,0,.3);
    font-size: 11px; color: var(--amber); letter-spacing: .06em;
  }
</style>
</head>
<body>

<div class="bottom-line"></div>

<!-- ヘッダー -->
<div class="header">
  <div class="header-logo">
    <div class="logo-dot"></div>
    CHAT
    <span class="class-badge">CLASS 3</span>
  </div>
  <div class="online-wrap">
    <div class="online-dot"></div>
    <span id="msgCountLabel">-</span>
  </div>
</div>

<!-- 名前設定バー -->
<div id="nameBar">
  <span class="name-bar-label">NAME :</span>
  <input type="text" id="nameInputBar" placeholder="名前を入力..." maxlength="20">
  <span class="name-warn">⚠ 本名は使用しないでください</span>
  <button class="name-set-btn" id="nameSetBtn">SET</button>
</div>

<!-- メッセージエリア -->
<div id="msgsArea"></div>

<!-- 閉鎖バナー -->
<div id="closedBanner">⏸ 現在チャットは閉鎖中です</div>

<!-- 入力エリア -->
<div class="input-area">
  <input type="text" id="chatInput" placeholder="メッセージを入力..." maxlength="200">
  <button id="sendBtn">SEND</button>
</div>

<script type="module">
  import { initializeApp }    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, doc, addDoc, query,
           orderBy, limit, onSnapshot, serverTimestamp, getDoc }
    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyAdQbSXJbRkd0C29O0hW5FgHERR_Vh9FZw",
    authDomain:        "fir-d5882.firebaseapp.com",
    projectId:         "fir-d5882",
    storageBucket:     "fir-d5882.firebasestorage.app",
    messagingSenderId: "68351757634",
    appId:             "1:68351757634:web:0e33ac84b7f1671939ccdb"
  };

  const app = initializeApp(firebaseConfig, "class3chat");
  const db  = getFirestore(app);

  const CLASS_ID = "3";
  const chatCol  = collection(db, "classes", CLASS_ID, "chat");

  // ── DOM ──
  const msgsArea     = document.getElementById('msgsArea');
  const chatInput    = document.getElementById('chatInput');
  const sendBtn      = document.getElementById('sendBtn');
  const nameBar      = document.getElementById('nameBar');
  const nameInputBar = document.getElementById('nameInputBar');
  const nameSetBtn   = document.getElementById('nameSetBtn');
  const closedBanner = document.getElementById('closedBanner');
  const msgCountLabel = document.getElementById('msgCountLabel');

  // ── 名前管理 ──
  const STORAGE_KEY = "class3_chatName";
  let myName = localStorage.getItem(STORAGE_KEY) || "";

  function applyName(name) {
    myName = name.trim() || "名無し";
    localStorage.setItem(STORAGE_KEY, myName);
    nameInputBar.value = myName;
    nameBar.style.background = "rgba(61,214,140,0.05)";
    nameBar.style.borderBottomColor = "rgba(61,214,140,0.25)";
    chatInput.disabled = false;
    sendBtn.disabled   = false;
    chatInput.focus();
  }

  // 初期化
  if (myName) {
    nameInputBar.value = myName;
    nameBar.style.background = "rgba(61,214,140,0.05)";
    chatInput.disabled = false;
    sendBtn.disabled   = false;
  } else {
    chatInput.disabled = true;
    sendBtn.disabled   = true;
  }

  nameSetBtn.addEventListener('click', () => {
    const n = nameInputBar.value.trim();
    if (!n) { nameInputBar.focus(); return; }
    applyName(n);
  });
  nameInputBar.addEventListener('keydown', e => {
    if (e.key === 'Enter') nameSetBtn.click();
  });

  // ── XSS対策 ──
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── 時刻フォーマット ──
  function fmtTime(ts) {
    if (!ts) return '';
    return new Date(ts.seconds * 1000)
      .toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });
  }
  function fmtDate(ts) {
    if (!ts) return '';
    return new Date(ts.seconds * 1000)
      .toLocaleDateString('ja-JP', { month:'2-digit', day:'2-digit', weekday:'short' });
  }

  // ── メッセージ描画 ──
  let lastDate = '';
  let allMsgs  = [];

  function renderMsgs(msgs) {
    msgCountLabel.textContent = msgs.length + ' MSGS';
    lastDate = '';
    msgsArea.innerHTML = '';

    msgs.forEach(m => {
      // 日付区切り
      const dateStr = m.ts ? fmtDate(m.ts) : '';
      if (dateStr && dateStr !== lastDate) {
        const div = document.createElement('div');
        div.className = 'date-divider';
        div.innerHTML = '<span>' + dateStr + '</span>';
        msgsArea.appendChild(div);
        lastDate = dateStr;
      }

      // システムメッセージ
      if (m.type === 'system') {
        const el = document.createElement('div');
        el.className = 'msg-system';
        el.textContent = m.text;
        msgsArea.appendChild(el);
        return;
      }

      const isMe = m.name === myName;
      const row  = document.createElement('div');
      row.className = 'msg-row' + (isMe ? ' me' : '');
      row.innerHTML =
        '<div class="msg-avatar">' + esc(m.name.charAt(0).toUpperCase()) + '</div>' +
        '<div class="msg-body">' +
          '<div class="msg-meta">' +
            '<span class="msg-name">' + esc(m.name) + '</span>' +
            '<span class="msg-time">' + fmtTime(m.ts) + '</span>' +
          '</div>' +
          '<div class="msg-bubble">' + esc(m.text) + '</div>' +
        '</div>';
      msgsArea.appendChild(row);
    });

    // 一番下へスクロール
    msgsArea.scrollTop = msgsArea.scrollHeight;
  }

  // ── リアルタイム受信 ──
  const q = query(chatCol, orderBy("ts", "asc"), limit(200));
  onSnapshot(q, snap => {
    allMsgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMsgs(allMsgs);
  });

  // ── チャット設定監視（クラス3専用の閉鎖フラグ） ──
  onSnapshot(doc(db, "classes", CLASS_ID, "settings", "chat"), snap => {
    const closed = snap.exists() ? (snap.data().closed || false) : false;
    closedBanner.style.display = closed ? 'block' : 'none';
    chatInput.disabled = closed || !myName;
    sendBtn.disabled   = closed || !myName;
    if (closed) {
      chatInput.placeholder = '【チャット閉鎖中】';
    } else {
      chatInput.placeholder = 'メッセージを入力...';
    }
  });

  // ── 送信 ──
  async function sendMsg() {
    const text = chatInput.value.trim();
    if (!text || !myName) return;
    chatInput.value = '';

    try {
      await addDoc(chatCol, {
        name: myName,
        text: text,
        ts:   serverTimestamp()
      });
    } catch(e) { console.error(e); }
  }

  sendBtn.addEventListener('click', sendMsg);
  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });
</script>
</body>
</html>
