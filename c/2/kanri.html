<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クラス2 管理</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #020408;
    --panel:   rgba(0,255,231,0.03);
    --border:  rgba(0,255,231,0.10);
    --border2: rgba(0,255,231,0.25);
    --accent:  #00ffe7;
    --accent2: #00a8ff;
    --text:    #c8f0ec;
    --dim:     #3a6660;
    --dim2:    #1e3835;
    --red:     #ff4466;
    --red-dim: rgba(255,68,102,0.10);
    --green:   #3dd68c;
    --mono:    'Share Tech Mono', monospace;
    --head:    'Rajdhani', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--mono);
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
  }
  body::after {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 44px 44px;
  }
  @keyframes blink { 0%,100%{opacity:1} 60%{opacity:.3} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* ヘッダー */
  .header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    height: 54px; padding: 0 24px;
    background: rgba(0,0,0,0.85);
    border-bottom: 1px solid var(--border2); flex-shrink: 0;
  }
  .header-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--head); font-size: 18px; font-weight: 700;
    letter-spacing: .15em; color: var(--accent);
    text-shadow: 0 0 20px rgba(0,255,231,0.4);
  }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 8px var(--green);
    animation: blink 2s ease-in-out infinite;
  }
  .class-badge {
    font-size: 10px; letter-spacing: .12em;
    color: var(--accent2); border: 1px solid rgba(0,168,255,.3);
    background: rgba(0,168,255,.06); border-radius: 4px; padding: 3px 10px;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .stat-num { font-size: 20px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 9px; color: var(--dim); letter-spacing: .1em; }

  /* メイン */
  .main { position: relative; z-index: 1; flex: 1; padding: 24px; overflow-y: auto; }
  .main::-webkit-scrollbar { width: 3px; }
  .main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* 追加フォーム */
  .add-form {
    background: var(--panel);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 20px 20px 16px;
    margin-bottom: 24px;
    animation: fadeUp .4s ease both;
  }
  .form-title {
    font-size: 10px; letter-spacing: .18em; color: var(--accent);
    text-transform: uppercase; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .form-title::after { content: ''; flex: 1; height: 1px; background: var(--border2); }
  .form-rows { display: flex; flex-direction: column; gap: 10px; }
  .form-row { display: flex; align-items: center; gap: 10px; }
  .form-label {
    font-size: 10px; letter-spacing: .1em; color: var(--accent);
    min-width: 60px; text-align: right; flex-shrink: 0;
  }
  .form-input {
    flex: 1; background: rgba(0,255,231,0.04);
    border: 1px solid var(--border2); border-radius: 4px;
    color: var(--text); font-family: var(--mono);
    font-size: 12px; padding: 8px 12px; outline: none;
    transition: border .15s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--dim2); }
  .form-btns { display: flex; gap: 8px; margin-top: 4px; justify-content: flex-end; }
  .btn-add {
    font-family: var(--mono); font-size: 11px; letter-spacing: .08em;
    padding: 8px 20px; border: 1px solid rgba(61,214,140,.4); border-radius: 5px;
    background: rgba(61,214,140,.07); color: var(--green);
    cursor: pointer; transition: all .15s; text-transform: uppercase;
  }
  .btn-add:hover { background: rgba(61,214,140,.18); border-color: var(--green); box-shadow: 0 0 14px rgba(61,214,140,.2); }
  .btn-cancel {
    font-family: var(--mono); font-size: 11px; letter-spacing: .08em;
    padding: 8px 18px; border: 1px solid var(--border2); border-radius: 5px;
    background: var(--panel); color: var(--dim);
    cursor: pointer; transition: all .15s; text-transform: uppercase;
    display: none;
  }
  .btn-cancel:hover { border-color: var(--accent); color: var(--accent); }

  /* セクション */
  .sec { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .sec-tag { font-size: 10px; letter-spacing: .18em; color: var(--accent); text-transform: uppercase; }
  .sec-bar { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border2), transparent); }
  .sec-num { font-size: 10px; color: var(--dim2); }

  /* テーブル */
  .table-wrap { background: var(--panel); border: 1px solid var(--border2); border-radius: 8px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead tr { background: rgba(0,255,231,0.04); border-bottom: 1px solid var(--border2); }
  thead th { padding: 10px 16px; text-align: left; font-size: 9px; letter-spacing: .14em; color: var(--dim); text-transform: uppercase; font-weight: 400; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(0,255,231,0.03); }
  tbody td { padding: 12px 16px; vertical-align: middle; }
  .td-name { color: var(--accent2); font-family: var(--head); font-size: 14px; font-weight: 600; letter-spacing: .04em; }
  .td-url { color: var(--dim); font-size: 11px; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .td-actions { display: flex; gap: 8px; }

  .btn-edit {
    font-family: var(--mono); font-size: 9px; padding: 5px 10px; border-radius: 4px;
    border: 1px solid rgba(0,168,255,.3); background: rgba(0,168,255,.06); color: var(--accent2);
    cursor: pointer; transition: all .15s;
  }
  .btn-edit:hover { border-color: var(--accent2); background: rgba(0,168,255,.16); }
  .btn-del {
    font-family: var(--mono); font-size: 9px; padding: 5px 10px; border-radius: 4px;
    border: 1px solid rgba(255,68,102,.3); background: var(--red-dim); color: rgba(255,68,102,.8);
    cursor: pointer; transition: all .15s;
  }
  .btn-del:hover { border-color: var(--red); color: var(--red); background: rgba(255,68,102,.2); }

  /* 空状態 */
  .empty-row td { text-align: center; padding: 40px; color: var(--dim); font-size: 11px; letter-spacing: .08em; }

  /* トースト */
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: rgba(10,20,30,0.95); border: 1px solid var(--border2);
    color: var(--text); padding: 10px 20px; border-radius: 6px;
    font-size: 11px; opacity: 0; transition: .25s; z-index: 200;
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* 確認ダイアログ */
  #confirmOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300; justify-content: center; align-items: center; }
  #confirmOverlay.active { display: flex; }
  #confirmBox { background: #0a0e1a; border: 1px solid var(--border2); border-radius: 10px; padding: 28px 24px; width: 300px; text-align: center; }
  #confirmBox h3 { color: var(--red); font-family: var(--head); font-size: 16px; margin-bottom: 10px; }
  #confirmBox p { font-size: 11px; color: var(--dim); line-height: 1.7; margin-bottom: 20px; }
  .confirm-btns { display: flex; gap: 10px; justify-content: center; }
  .confirm-btns button { font-family: var(--mono); font-size: 11px; padding: 8px 20px; border-radius: 4px; cursor: pointer; transition: all .15s; text-transform: uppercase; letter-spacing: .06em; }
  .btn-cc { background: var(--panel); border: 1px solid var(--border2); color: var(--dim); }
  .btn-cc:hover { border-color: var(--accent); color: var(--accent); }
  .btn-co { background: var(--red-dim); border: 1px solid rgba(255,68,102,.4); color: var(--red); }
  .btn-co:hover { background: rgba(255,68,102,.25); border-color: var(--red); }
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <div class="header-logo">
    <div class="logo-dot"></div>
    CLASS KANRI
    <span class="class-badge">1</span>
  </div>
  <div class="header-right">
    <div style="text-align:center;">
      <div class="stat-num" id="statTotal">-</div>
      <div class="stat-label">SITES</div>
    </div>
  </div>
</div>

<!-- メイン -->
<div class="main">

  <!-- 追加フォーム -->
  <div class="add-form">
    <div class="form-title">+ SITE を追加 / 編集</div>
    <div class="form-rows">
      <div class="form-row">
        <span class="form-label">名前</span>
        <input type="text" class="form-input" id="inputName" placeholder="例: Google" maxlength="30">
      </div>
      <div class="form-row">
        <span class="form-label">URL</span>
        <input type="text" class="form-input" id="inputUrl" placeholder="例: https://google.com" maxlength="300">
      </div>
    </div>
    <div class="form-btns">
      <button class="btn-cancel" id="cancelBtn" onclick="window.cancelEdit()">キャンセル</button>
      <button class="btn-add" id="submitBtn" onclick="window.submitSite()">+ 追加</button>
    </div>
  </div>

  <!-- サイト一覧 -->
  <div class="sec">
    <span class="sec-tag">// SITE LIST</span>
    <div class="sec-bar"></div>
    <span class="sec-num" id="siteCount">-</span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:25%">名前</th>
          <th style="width:55%">URL</th>
          <th style="width:20%">操作</th>
        </tr>
      </thead>
      <tbody id="siteTableBody">
        <tr class="empty-row"><td colspan="3">読み込み中...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<div id="toast"></div>

<div id="confirmOverlay">
  <div id="confirmBox">
    <h3>🗑 削除確認</h3>
    <p id="confirmText">このサイトを削除しますか？</p>
    <div class="confirm-btns">
      <button class="btn-cc" onclick="window.closeConfirm()">キャンセル</button>
      <button class="btn-co" id="confirmOkBtn">削除する</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
           query, orderBy, onSnapshot, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyAdQbSXJbRkd0C29O0hW5FgHERR_Vh9FZw",
    authDomain:        "fir-d5882.firebaseapp.com",
    projectId:         "fir-d5882",
    storageBucket:     "fir-d5882.firebasestorage.app",
    messagingSenderId: "68351757634",
    appId:             "1:68351757634:web:0e33ac84b7f1671939ccdb"
  };

  const app = initializeApp(firebaseConfig, "class2kanri");
  const db  = getFirestore(app);

  const CLASS_ID = "2";
  const colRef   = collection(db, "classes", CLASS_ID, "sites");

  const toast   = document.getElementById('toast');
  const tbody   = document.getElementById('siteTableBody');
  let allSites  = [];
  let editingId = null;

  function showToast(msg, dur = 3000) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), dur);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── テーブル描画 ──
  function renderTable(sites) {
    document.getElementById('statTotal').textContent = sites.length;
    document.getElementById('siteCount').textContent = sites.length + ' sites';

    if (sites.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="3">サイトがまだ追加されていません</td></tr>';
      return;
    }

    tbody.innerHTML = sites.map(s =>
      '<tr>' +
        '<td class="td-name">' + esc(s.name) + '</td>' +
        '<td class="td-url"><a href="' + esc(s.url) + '" target="_blank" style="color:var(--accent2);text-decoration:none;">' + esc(s.url) + '</a></td>' +
        '<td class="td-actions">' +
          '<button class="btn-edit" onclick="window.editSite(\'' + s.id + '\')">✏ 編集</button>' +
          '<button class="btn-del"  onclick="window.confirmDel(\'' + s.id + '\', \'' + esc(s.name) + '\')">🗑</button>' +
        '</td>' +
      '</tr>'
    ).join('');
  }

  // ── リアルタイム取得 ──
  const q = query(colRef, orderBy("createdAt", "asc"));
  onSnapshot(q, snap => {
    allSites = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderTable(allSites);
  });

  // ── 追加 / 更新 ──
  window.submitSite = async function() {
    const name = document.getElementById('inputName').value.trim();
    const url  = document.getElementById('inputUrl').value.trim();
    if (!name) { showToast('名前を入力してください'); return; }
    if (!url)  { showToast('URLを入力してください'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;

    try {
      if (editingId) {
        // 編集
        await updateDoc(doc(db, "classes", CLASS_ID, "sites", editingId), { name, url });
        showToast('✅ 更新しました: ' + name);
        window.cancelEdit();
      } else {
        // 新規追加
        await addDoc(colRef, { name, url, createdAt: serverTimestamp() });
        showToast('✅ 追加しました: ' + name);
        document.getElementById('inputName').value = '';
        document.getElementById('inputUrl').value  = '';
        document.getElementById('inputName').focus();
      }
    } catch(e) { showToast('エラー: ' + e.message); }

    btn.disabled = false;
  };

  // ── 編集 ──
  window.editSite = function(id) {
    const site = allSites.find(s => s.id === id);
    if (!site) return;
    editingId = id;
    document.getElementById('inputName').value = site.name;
    document.getElementById('inputUrl').value  = site.url;
    document.getElementById('submitBtn').textContent = '✓ 更新';
    document.getElementById('cancelBtn').style.display = '';
    document.getElementById('inputName').focus();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.cancelEdit = function() {
    editingId = null;
    document.getElementById('inputName').value = '';
    document.getElementById('inputUrl').value  = '';
    document.getElementById('submitBtn').textContent = '+ 追加';
    document.getElementById('cancelBtn').style.display = 'none';
  };

  // ── 削除 ──
  window.confirmDel = function(id, name) {
    document.getElementById('confirmText').textContent = '「' + name + '」を削除しますか？';
    document.getElementById('confirmOkBtn').onclick = async () => {
      window.closeConfirm();
      try {
        await deleteDoc(doc(db, "classes", CLASS_ID, "sites", id));
        showToast('🗑 削除しました: ' + name);
      } catch(e) { showToast('エラー: ' + e.message); }
    };
    document.getElementById('confirmOverlay').classList.add('active');
  };

  window.closeConfirm = function() {
    document.getElementById('confirmOverlay').classList.remove('active');
  };

  // Enterで送信
  ['inputName','inputUrl'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') window.submitSite();
    });
  });
</script>
</body>
</html>
